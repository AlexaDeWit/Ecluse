# Fourmolu configuration — the single source of truth for Haskell formatting.
#
# These values are fourmolu 0.14's defaults, pinned explicitly so that (a) the
# formatting rules are legible to newcomers without consulting fourmolu's docs,
# and (b) the layout cannot drift if the tool's defaults change in a future
# version. The dev shell pins fourmolu itself via flake.lock.
#
# Do not hand-format Haskell; run `make format` (writes) or `make format-check`
# (the gating check). See STYLE.md → "Formatting".

# Number of spaces per indentation step.
indentation: 4

# No hard column limit; we wrap by hand where it reads best.
column-limit: none

# Arrows in type signatures sit at the end of the line.
function-arrows: trailing

# Leading commas in multi-line lists, records, and export lists.
comma-style: leading

# Import/export lists optimised for clean diffs.
import-export-style: diff-friendly

# Half-indent `where` bindings.
indent-wheres: false

# No space before an opening record brace.
record-brace-space: false

# One blank line between top-level declarations.
newlines-between-decls: 1

# Multi-line Haddock comment style.
haddock-style: multi-line
haddock-style-module: null

# Let fourmolu choose let-block layout.
let-style: auto
in-style: right-align

# Always parenthesise a single constraint.
single-constraint-parens: always

# ASCII syntax only.
unicode: never

# Preserve the author's blank lines where reasonable.
respectful: true

fixities: []
reexports: []
