# weeder — reports library code that is not reachable from the application entry
# point (app/Main.hs → Ecluse.run). `make weeder` builds only the library +
# executable (not the test suites) with .hie info, so "reachable" means "wired
# into the running proxy" — NOT merely "covered by a test".
#
# That deliberately surfaces any library code not yet wired into the composition
# root (config loading, policy resolution, the queue/credential backends, …) as it
# is built and tested ahead of the slice that connects it. The tree is wired through
# to zero app-unreachable definitions today, and the `weeder` CI job GATES on that: a
# newly-introduced unreachable definition fails the job and blocks the merge (see
# ci.yml → weeder), so a slice lands its scaffolding and the wiring that reaches it
# together, or roots the definition below.

# Reachability roots: the executable entry point and Cabal's generated Paths_,
# plus one documented structural exception.
#
# Ecluse.Core.Security.Egress.DevHttp.loopbackRegistryUrl is rooted deliberately
# rather than relocated out of ecluse-core: the plain-http RegistryUrl former is
# locked inside the egress boundary on purpose (the raw constructor lives in the
# unexposed Ecluse.Core.Security.Egress.Internal, and the https-only egress
# design keeps that constructor unreachable from any exposed surface), so moving
# the former to a test or bench library would widen that boundary. Its consumers
# are the hermetic test tiers and the load harness, none of which weeder roots,
# and the module only exists under the dev-http-egress flag (absent from a
# release build).
roots = [
  "^Main\\.main$",
  "^Paths_",
  "^Ecluse\\.Core\\.Security\\.Egress\\.DevHttp\\.loopbackRegistryUrl$",
]

# Treat instance methods as roots, so lawful type-class instances aren't reported
# just because the app has no direct call site for them.
type-class-roots = true
