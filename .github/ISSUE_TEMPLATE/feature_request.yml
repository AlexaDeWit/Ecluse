name: Feature request
description: Suggest a capability or change to Écluse.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and where does Écluse fall short today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: What should happen instead. Sketch the policy/config/interface if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, or existing workarounds.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: If I used an AI tool to help draft this, I have verified the details myself (see CONTRIBUTING.md → AI-assisted contributions).
          required: true
