name: Security

# Vulnerability scanning, **report-only**: it never gates a PR, because findings
# arrive with disclosure time, not with in-PR changes. Two scanners cover the two
# halves of the shipped closure: grype scans the image's C closure via the
# sbomnix SBOM (statically linked Haskell libraries are invisible to it), and
# osv-scanner matches every exact pin in cabal.project.freeze, the committed
# projection of the Nix package set, against OSV.dev, home of the HSEC
# advisories the GitHub Advisory Database lacks. Both upload SARIF to GitHub
# code scanning, so every finding is triaged in the Security tab and the issue
# tracker holds only human-filed work. On a PR they run only when the dependency
# plan changes; on the daily schedule they scan main, so advisories disclosed
# after a release still surface. Remediation is always flake-side; Renovate's
# weekly flake.lock refresh carries it. See
# docs/architecture/release-supply-chain.md → "Vulnerability scanning and
# dependency freshness".
on:
  pull_request:
    paths: ["flake.lock", "flake.nix", "cabal.project.freeze", ".github/workflows/security.yml"]
  schedule:
    - cron: "27 6 * * *" # daily, off-peak minute
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  scan:
    name: Vulnerability scan (grype)
    runs-on: ubuntu-latest
    # Sized for a cold run after a dependency-overlay change in flake.nix:
    # sbomnix builds .#ecluse-bin, so the job pays the full source rebuild of
    # the overridden closure that the main-written cache does not yet hold.
    # Warm runs finish in a fraction of this.
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write # authenticate to FlakeHub Cache (OIDC)
      security-events: write # upload the grype SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          # Restore-only for the shared Nix store: build-test is its single
          # writer.
          save-nix-store: "false"

      # grype scans the sbomnix SBOM of .#ecluse-bin → grype.sarif (+ a table
      # in the log).
      - name: Scan image closure (grype)
        run: nix develop .#ci --command task scan

      - name: Upload grype SARIF to code scanning
        # Surface the closure CVEs in the Security tab (code scanning), alongside
        # Semgrep + Scorecard, via sarif upload
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: grype.sarif
          category: grype

  osv-freeze:
    name: Haskell advisories (OSV/HSEC over the freeze)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # authenticate to FlakeHub Cache (OIDC)
      security-events: write # upload the osv-scanner SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          # Restore-only for the shared Nix store: build-test is its single
          # writer.
          save-nix-store: "false"

      # osv-scanner (from the pinned nixpkgs, like grype) reads the freeze
      # natively; findings are report-only, so only a scanner error fails here.
      - name: Scan cabal.project.freeze (osv-scanner)
        run: nix develop .#ci --command task scan-osv

      - name: Upload osv-scanner SARIF to code scanning
        # Surface the HSEC advisories in the Security tab (code scanning),
        # alongside grype + Semgrep + Scorecard.
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: osv-freeze.sarif
          category: osv-hsec
