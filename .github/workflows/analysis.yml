name: Analysis

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * *" # nightly health check
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  weeder:
    name: Dead-code report (weeder — fails, never gates)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # FAILS on findings (a visible red signal) but is NOT a `gate` dependency, so it
    # never blocks a merge. weeder reports library code not reachable from the application
    # entry point. Runs on EVERY PR so a newly-introduced unreachable definition is
    # surfaced on the PR that adds it. Warm deps (restored from main) keep it cheap.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      # dist-weeder is keyed on the SOURCE TREE (the dependency plan plus every
      # first-party .hs file and the cabal file), with NO restore-keys fallback,
      # deliberately: cabal cannot delete the build artifacts of removed source
      # files, so a builddir restored from a different tree keeps orphaned .hie
      # files for modules that no longer exist, and weeder scans the orphans.
      # The poisoning is measured, on the stan job: 132 observations reported on
      # a commit whose true floor is 35, scanning 140 modules where the tree has
      # 122. weeder shares the exposure and is about to become gating, where a
      # poisoned builddir means false reds or false greens on the gate.
      # Exact-key-or-nothing costs a cold local build (several minutes) on any
      # PR that touches a .hs or .cabal file; the dependency store still comes
      # warm from the cabal-store cache, and a docs-only or workflow-only push
      # still hits exactly.
      #
      # The source hash is an ALLOWLIST of the first-party source directories,
      # never a bare '**/*.hs': hashFiles does not honour .gitignore, and the
      # workspace holds generated .hs files (Paths_*/PackageInfo_* under the
      # restored dist-newstyle before the build, plus this job's own builddir
      # after it), so a bare glob hashes different file sets at restore and at
      # save and the saved key would never round-trip. Maintenance rule: a NEW
      # top-level Haskell source directory must be added to this list.
      # Forgetting costs only a spurious cold build, never stale reuse, which is
      # why the allowlist was chosen over a '!dist-*/**' denylist (a denylist
      # fails unsafe when a new dist-* appears, and leans on negation-ordering
      # semantics).
      - name: Restore weeder build (dist-weeder)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: dist-weeder
          key: dist-weeder-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze', 'ecluse.cabal', 'acceptance/**/*.hs', 'app/**/*.hs', 'bench/**/*.hs', 'core/**/*.hs', 'gen/**/*.hs', 'manifest/**/*.hs', 'runtime/**/*.hs', 'src/**/*.hs', 'test/**/*.hs') }}

      - name: Update package index
        run: nix develop .#weeder --command task update

      - name: weeder (fails on findings; non-gating)
        run: |
          set -eo pipefail
          nix develop .#weeder --command task weeder 2>&1 | tee weeder.out

      - name: Render weeder findings to the run summary
        if: always()
        run: |
          {
            echo '## weeder — library code not yet reachable from the app entry';
            echo;
            echo '_Non-gating: fails the job, not the CI gate. These are built/tested but not yet wired into the app entry (Ecluse.run) — feature scaffolding that shrinks as slices land._';
            echo;
            echo '```';
            grep -E ':[0-9]+:[0-9]+:' weeder.out || echo '(no findings)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      # Single writer, main only; the key matches the restore key verbatim.
      - name: Save weeder build (dist-weeder, main)
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: dist-weeder
          key: dist-weeder-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze', 'ecluse.cabal', 'acceptance/**/*.hs', 'app/**/*.hs', 'bench/**/*.hs', 'core/**/*.hs', 'gen/**/*.hs', 'manifest/**/*.hs', 'runtime/**/*.hs', 'src/**/*.hs', 'test/**/*.hs') }}

  stan:
    name: Haskell static analysis (stan — fails, never gates)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # FAILS on findings (a visible red signal) but is NOT a `gate` dependency, so it
    # never blocks a merge. Stan analyses GHC HIE files for partial functions + potential bugs
    # that Semgrep (no Haskell) and hlint (no type info) can't see, scoped by .stan.toml to a Warning floor.
    # Builds its own dist-stan, like weeder. Warm deps (restored from main) keep it cheap.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      # dist-stan is keyed and guarded exactly like dist-weeder above:
      # source-tree key, no restore-keys fallback, allowlisted source
      # directories. See that step's comment for the full rationale. In short:
      # cabal cannot delete the build artifacts of removed source files, so any
      # fallback restore hands stan orphaned .hie files to scan (measured here:
      # 132 observations against a true floor of 35, 140 modules scanned where
      # the tree has 122), and hashFiles does not honour .gitignore, so a bare
      # '**/*.hs' would hash generated .hs files and never round-trip between
      # restore and save. Maintenance rule: a NEW top-level Haskell source
      # directory must be added to this list; forgetting costs only a spurious
      # cold build, never stale reuse.
      - name: Restore stan build (dist-stan)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: dist-stan
          key: dist-stan-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze', 'ecluse.cabal', 'acceptance/**/*.hs', 'app/**/*.hs', 'bench/**/*.hs', 'core/**/*.hs', 'gen/**/*.hs', 'manifest/**/*.hs', 'runtime/**/*.hs', 'src/**/*.hs', 'test/**/*.hs') }}

      - name: Update package index
        run: nix develop .#stan --command task update

      - name: stan (fails on findings; non-gating)
        run: |
          set -eo pipefail
          nix develop .#stan --command task stan 2>&1 | tee stan.out

      - name: Render stan findings to the run summary
        if: always()
        run: |
          {
            echo '## stan — Haskell static analysis (non-gating: fails the job, not the CI gate)';
            echo;
            echo 'Partial functions and potential bugs (HIE-based) at the Warning floor. Nothing is ignored without an explicit decision; run "task stan-all" locally for the full set incl Performance/space-leak.';
            echo;
            echo '```';
            sed -E 's/\x1b\[[0-9;]*m//g' stan.out 2>/dev/null || echo '(no output)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      # Single writer, main only; the key matches the restore key verbatim.
      - name: Save stan build (dist-stan, main)
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: dist-stan
          key: dist-stan-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze', 'ecluse.cabal', 'acceptance/**/*.hs', 'app/**/*.hs', 'bench/**/*.hs', 'core/**/*.hs', 'gen/**/*.hs', 'manifest/**/*.hs', 'runtime/**/*.hs', 'src/**/*.hs', 'test/**/*.hs') }}
