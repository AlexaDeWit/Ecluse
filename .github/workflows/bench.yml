name: Benchmarks

# Runs on every pull request and on manual dispatch. The benchmarks are a standalone,
# inform-only tier: they are NOT wired into ci.yml's `gate`, so they never block a
# merge, and the run's only red state is a literal benchmark failure (a build error, a
# crashed harness, or a tripped complexity assertion). It never computes a
# perf-regression fail — time and allocations are reported in the run summary for a
# human to read, never compared to a threshold. There is no cross-run baseline: a run's
# results are downloadable from its own page but are not consumed by any other run. See
# docs/architecture/performance.md.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# One run per ref. Cancel a superseded PR run when a newer commit is pushed (only the
# latest commit's numbers matter); never cancel a manual dispatch.
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: a read-only token is all this workflow needs. Artifact upload uses
# the run's own artifact service (the runtime token), not the GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  bench:
    name: Work-per-request benchmarks (inform-only)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Pin the cabal store to a deterministic, cacheable location, as the other
      # Haskell jobs do.
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          # Restore the warm cabal store (this job compiles the benchmark).
          cabal-cache: "true"
          # Restore the shared Nix store but never write it: build-test on main is the
          # single writer, and this dispatch job realizes the `.#bench` closure, so
          # saving here would race and bloat the canonical entry. Restore-only.
          save-nix-store: "false"

      - name: Update package index
        run: nix develop .#bench --command task update

      # Run the benches, capturing the console table (time + allocations) for the run
      # summary and a CSV uploaded as this run's downloadable results. `task bench`
      # never gates on performance; this step fails only on a genuine benchmark failure.
      - name: Run benchmarks
        run: |
          nix develop .#bench --command task bench BENCH_OPTS='--csv bench-results.csv' 2>&1 | tee bench-output.txt

      - name: Render results to the run summary
        if: always()
        run: |
          {
            echo '## Benchmarks — work-per-request over ecluse-core';
            echo;
            echo 'Time AND allocations per pure hot path. Allocations (from GC stats) are the machine-independent signal tracked across commits; time is informational and varies with the runner. This workflow never computes a perf-regression fail — its only red state is a literal benchmark failure (a build error, a crashed harness, or a tripped complexity assertion).';
            echo;
            echo '```';
            sed -E 's/\x1b\[[0-9;]*m//g' bench-output.txt 2>/dev/null || echo '(no output)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      # This run's results, downloadable from the run page (the CSV + the console
      # table). A convenience for a human comparing by hand — there is no cross-run
      # baseline store. Uploaded even when a complexity assertion fails, so the numbers
      # survive a red run.
      - name: Upload this run's results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-results-${{ github.sha }}
          path: |
            bench-results.csv
            bench-output.txt
          if-no-files-found: warn
