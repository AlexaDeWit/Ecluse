name: Docs

# Publish the library's Haddock API docs to GitHub Pages so they always track
# the code on main. Runs on every push to main and on demand. This is a separate
# lifecycle from the PR `gate` in ci.yml — a docs-deploy failure must never block
# a merge — and, like every workflow here, each action is pinned to a full commit
# SHA (Dependabot keeps them current).
on:
  push:
    branches: [main]
  workflow_dispatch:

# One Pages deploy at a time; let an in-flight publish finish rather than
# cancelling it (a half-applied deploy is worse than a slightly stale one).
concurrency:
  group: pages
  cancel-in-progress: false

# Least privilege: read the repo, write the Pages artifact + deployment, and mint
# the OIDC token the deploy step exchanges with the Pages service.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build & deploy Haddock
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      # Pin the cabal store to a deterministic, cacheable location (as in ci.yml).
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Same reproducible dev shell as ci.yml and developers, pinned by flake.lock.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # Restore the shared compiled-dependency store + build dir that ci.yml's
      # build-test job populates on main. RESTORE ONLY — this workflow never writes
      # a cache (build-test is the single writer), and it uses the same stable,
      # dependency-plan key as every other job (flake.lock + cabal.project +
      # cabal.project.freeze) instead of the old `**/*.cabal` key that churned a
      # separate ~0.3 GB lineage on every module add. Pages runs after build-test on
      # the same main push, so the store is warm. See CONTRIBUTING.md → "Cache
      # management".
      - name: Restore cabal store
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.cabal
          key: cabal-store-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            cabal-store-${{ runner.os }}-

      - name: Restore dist-newstyle
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: dist-newstyle
          key: dist-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            dist-${{ runner.os }}-

      - name: Update package index
        run: nix develop --command make update

      # Builds the library's Haddock and stages it (with .nojekyll) into ./_site.
      - name: Build Haddock into ./_site
        run: nix develop --command make docs-site

      # enablement: true turns Pages on via the API on first run, so no manual
      # repo-settings step is needed to bootstrap this.
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
