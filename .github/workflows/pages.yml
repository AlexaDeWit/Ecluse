name: Docs

# Publish the project site to GitHub Pages so it always tracks the code on main:
# the home page at the root and the library's Haddock API docs under /api. Runs on
# every push to main and on demand. This is a separate lifecycle from the PR `gate`
# in ci.yml — a docs-deploy failure must never block a merge — and, like every
# workflow here, each action is pinned to a full commit SHA (Dependabot keeps them
# current).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Only the most recent main commit's site matters, so cancel an in-progress
# publish when a newer push lands rather than letting the now-superseded build run
# to completion (wasted CI). The `pages` group already collapses queued runs to the
# latest; cancel-in-progress drops the in-flight one too. Pages publishes
# atomically, so a cancelled run simply leaves the prior deployment live until the
# next one completes — there is no half-applied state.
concurrency:
  group: pages
  cancel-in-progress: true

# Least privilege: read the repo, write the Pages artifact + deployment, and mint
# the OIDC token the deploy step exchanges with the Pages service.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build & deploy site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      # Pin the cabal store to a deterministic, cacheable location (as in ci.yml).
      # Unlike the gate jobs, Pages does NOT restore build-test's pristine cabal
      # store into this directory: it fills it with the documentation-variant
      # closure instead (see the doc-variant cache steps below).
      CABAL_DIR: ${{ github.workspace }}/.cabal
      # The build directory `task site` writes Haddock + the OpenAPI manifest into.
      # Cached under its own dist-docs-* key, so the doc-variant build products never
      # collide with the gate's regular-variant dist-newstyle entry.
      DOCS_BUILDDIR: dist-docs
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Same SHA-pinned setup as the gate jobs (install Nix + restore the shared Nix
      # store). save-nix-store: false keeps Pages RESTORE-ONLY for the Nix store:
      # build-test is the single writer, and Pages runs on main concurrently, so it
      # must not race it for the nix-<os>-<flakehash> entry. cabal-cache is OFF: the
      # composite's cabal/dist caches hold the REGULAR build variant (written by
      # build-test's `cabal build all`), which `cabal haddock` cannot reuse — it needs
      # a documentation-variant of the whole closure. Pages restores/saves its own
      # doc-variant store + builddir instead (the two steps below). See AGENTS.md.
      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "false"
          save-nix-store: "false"

      # The documentation-variant cabal store. `cabal haddock` builds + installs a
      # doc-variant of every dependency (different ConfiguredId than the regular
      # build variant), and that closure — not our own ~55 s of Haddock — is ~84% of
      # this job's wall time. It lives in CABAL_DIR (= the store), cached under a
      # docs-specific key so it never collides with build-test's pristine
      # cabal-store-* entry. Keyed on the same dependency plan, so it stays a hit
      # until a real dependency bump; the restore-keys prefix gives partial warmth
      # across an epoch change (cabal reuses unchanged store entries, rebuilds only
      # the changed deps). Pages always runs on main and the `pages` concurrency
      # group serializes it, so Pages is this cache's single writer — restore here,
      # save below (main only).
      - name: Restore doc-variant cabal store
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.cabal
          key: cabal-store-docs-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            cabal-store-docs-${{ runner.os }}-

      # The doc-variant build products of our own two libraries (the published
      # Haddock HTML) + the openapi-gen executable, in their own builddir
      # (DOCS_BUILDDIR), kept distinct from the gate's regular-variant dist-newstyle.
      # Small and fast-moving next to the store above; same dep-plan key.
      - name: Restore doc-variant builddir
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.DOCS_BUILDDIR }}
          key: dist-docs-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            dist-docs-${{ runner.os }}-

      - name: Update package index
        run: nix develop .#docs --command task update

      # Assembles the Pages site into ./_site: the home page at the root and the
      # library Haddock under /api (with .nojekyll at the root). Runs in the lean
      # `.#docs` shell (Haskell toolchain + pandoc only), not the heavy default human
      # shell the job used to enter. DOCS_BUILDDIR routes the doc-variant build into
      # the separately-cached tree restored above.
      - name: Build the Pages site into ./_site
        run: nix develop .#docs --command task site DOCS_BUILDDIR="$DOCS_BUILDDIR"

      # Cache writes: main only, single writer (Pages). Right after the build that
      # produced them and before the deploy steps, so the expensive doc-variant
      # closure is saved even if a later step (Configure/Upload/Deploy) fails — the
      # deps built fine and are worth caching. actions/cache/save no-ops when the key
      # already exists, so an unchanged-deps push writes nothing; a dependency epoch
      # is saved once, then reused untouched. Keys match the restore keys exactly.
      - name: Save doc-variant cabal store (main)
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.cabal
          key: cabal-store-docs-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}

      - name: Save doc-variant builddir (main)
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.DOCS_BUILDDIR }}
          key: dist-docs-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}

      # enablement: true turns Pages on via the API on first run, so no manual
      # repo-settings step is needed to bootstrap this.
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
