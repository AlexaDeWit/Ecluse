name: Release

# Publishing is a separate lifecycle from the PR `gate` in ci.yml: it runs only
# when a version tag is pushed (or dispatched manually), builds the Nix image,
# pushes it under an immutable `X.Y.Z` tag, attaches keyless provenance + SBOM
# attestations, and (on a real tag) publishes a GitHub Release pinning the digest.
# It is never a gate dependency.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 0.1.0)"
        required: true

# Never cancel an in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Build, push & attest image
    runs-on: ubuntu-latest
    # The token lives on a protected environment (required reviewers), so only an
    # approved release can read it. Configure DOCKERHUB_USERNAME / DOCKERHUB_TOKEN
    # there — until then this job fails at the push step, by design.
    environment: release
    permissions:
      contents: write # create the GitHub Release (digest pin + verify recipe + notes)
      id-token: write # OIDC: keyless signing of the attestations (Fulcio/Rekor)
      attestations: write # record the provenance/SBOM attestations
    env:
      IMAGE: docker.io/alexadewit/ecluse
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # Untrusted refs flow through env, never interpolated into the run script.
      - name: Resolve image tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="${REF_NAME#v}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: nix develop --command make docker-build

      - name: Push image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: nix develop --command make docker-push TAG="$TAG"

      # Attestations bind to the image *digest*, not the tag; resolve it from the
      # registry (public read, no auth needed).
      - name: Resolve pushed digest
        id: digest
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          digest=$(nix develop --command skopeo inspect "docker://$IMAGE:$TAG" --format '{{.Digest}}')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      # SBOM from the Nix closure of the exact shipped binary (.#ecluse-bin).
      - name: Generate SBOM
        run: nix develop --command make sbom

      # Authenticate so the attest actions can push referrers to Docker Hub.
      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # SLSA provenance, keyless (OIDC → Fulcio/Rekor), stored as an immutable OCI
      # referrer on the image — compatible with the repo's immutable tags.
      - name: Attest provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      # SBOM (sbomnix SPDX) as a second immutable OCI referrer (+ Rekor).
      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          sbom-path: sbom/ecluse.spdx.json
          push-to-registry: true

      # On a real version tag (not an rc dispatch), publish a GitHub Release that
      # pins the digest, gives the `gh attestation verify` recipe, and carries the
      # auto-generated changelog — the canonical place to discover the digest.
      # Untrusted refs flow through env, never into the run script directly.
      - name: Publish GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          bash scripts/release-notes.sh "$TAG" "$IMAGE" "$DIGEST" > "$RUNNER_TEMP/notes.md"
          pre=""; case "$TAG" in *-*) pre="--prerelease" ;; esac
          gh release create "$TAG" --title "$TAG" --notes-file "$RUNNER_TEMP/notes.md" --verify-tag $pre
