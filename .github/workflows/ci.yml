name: CI

# Run on pushes to main (post-merge verification) and on every PR; a
# feature-branch push no longer double-runs alongside its PR. Manual dispatch is
# kept for re-runs. The nightly schedule re-runs the workflow on main as a health
# check — most valuably the smoke tier, which catches live-registry protocol drift
# that lands independent of our commits. Push runs therefore always use main's
# workflow definition; PR runs use the PR head's, by GitHub's design.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * *" # nightly health check (most valuably the smoke tier)
  workflow_dispatch:

# Cancel superseded runs for the same ref on PRs/branches, but never on main —
# keep the complete, accurate build history of every commit that lands there.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least privilege by default: a read-only token. Jobs that need more (the
# coverage upload's OIDC) widen it at the job level.
permissions:
  contents: read

# All gating checks are jobs in this one graph and feed the terminal `gate` job,
# which is the single Required status check in branch protection (plus Codecov's
# server-side statuses; see docs/testing.md → "Coverage"). Setup actions are
# SHA-pinned once in .github/actions/setup-toolchain; CI enters the lean `.#ci`
# dev shell.
#
# Caching is restore-everywhere / SAVE-ONLY-ON-main: the heavy compiled-dependency
# store is built once on main and reused by every PR (which never write their own
# copies). build-test is the single writer. See AGENTS.md → "CI & Security" and the setup-toolchain action.
jobs:
  build-test:
    name: Build & tests (core-unit + app-unit + integration)
    # One job builds the project ONCE (library, executable, all three test
    # suites) and then runs every Haskell test tier against those same on-disk
    # artifacts — unit, integration, doctest, coverage. Previously build-and-test
    # and integration were separate jobs on separate runners, so the ~8-minute
    # dependency build ran twice per PR (and raced each other to populate one
    # shared, first-writer-wins cabal cache that ended up incomplete for the
    # widest plan). Building once, in one workspace, removes that whole class of
    # waste. Runs on ubuntu-latest, which ships the Docker daemon ministack /
    # testcontainers need for the integration tier.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # OIDC for tokenless Codecov upload (no stored token)
    env:
      # Pin the cabal store to a deterministic, cacheable location.
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      - name: Update package index
        run: nix develop .#ci --command make update

      # The single heavy step: build everything (all three test suites included),
      # so a broken integration/smoke suite fails the gate, and so the cabal store
      # this job caches covers the WIDEST dependency plan — every other Haskell
      # job (docs, smoke, weeder) resolves a subset and is fully served by it.
      - name: Build (library, executable, all test suites)
        run: nix develop .#ci --command make build

      - name: Unit tests (core + app)
        run: nix develop .#ci --command make test

      # Same warm build dir, so the integration tier costs only its own (small)
      # test-suite link + the ministack containers — not another dependency build.
      - name: Integration tests (ministack)
        run: nix develop .#ci --command make test-integration

      # Run the >>> examples in Haddock comments as tests (doctest), reusing the
      # warm build above so documented examples can't drift from the code. Gates
      # through this job. See HADDOCK.md → "Examples that run".
      - name: Doctest (Haddock examples)
        run: nix develop .#ci --command make doctest

      # Instrumented re-runs of the unit suites in a separate build dir, each
      # emitting Codecov-native JSON. Only our small package recompiles (-fhpc);
      # deps come from the cached cabal store, so this is cheap. Both suites upload
      # under the `unit` flag; Codecov merges them into one flag total. This is the
      # fix for the phase 2a regression where core modules silently dropped from
      # Codecov attribution (PR2b). See CONTRIBUTING.md → "Coverage".
      - name: Coverage (core unit)
        run: nix develop .#ci --command make coverage SUITE=ecluse-core-unit

      - name: Upload core unit coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true # tokenless upload via GitHub OIDC; no CODECOV_TOKEN secret
          files: coverage/ecluse-core-unit.json
          flags: unit
          fail_ci_if_error: true # a lost upload must not silently skip the gate

      - name: Coverage (app unit)
        run: nix develop .#ci --command make coverage SUITE=ecluse-unit

      - name: Upload app unit coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true # tokenless upload via GitHub OIDC; no CODECOV_TOKEN secret
          files: coverage/ecluse-unit.json
          flags: unit
          fail_ci_if_error: true # a lost upload must not silently skip the gate

      # Instrumented re-run of the integration suite (against the same ministack
      # tier as above), so the cloud-backed modules the unit suites cannot exercise
      # — the SQS MirrorQueue backend — count toward the merged Codecov total. Like
      # the unit passes, only our package recompiles under -fhpc.
      - name: Coverage (integration)
        run: nix develop .#ci --command make coverage SUITE=ecluse-integration

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true # tokenless upload via GitHub OIDC; no CODECOV_TOKEN secret
          files: coverage/ecluse-integration.json
          flags: integration
          fail_ci_if_error: true # a lost upload must not silently skip the gate

      # ---- Cache writes: main only, single writer ---------------------------
      # This job is the sole writer of the cabal store + dist-newstyle caches, and
      # only from main. PRs restore these (from main's entries) but never save, so
      # they don't each leave a branch-scoped copy and blow the 10 GB quota.
      # !cancelled() so a warm store is still saved when a later tier (e.g.
      # integration) fails — the deps built fine and are worth caching. The store
      # is saved from the widest plan above, so the entry is complete. Keys match
      # the restore keys in setup-toolchain exactly. actions/cache/save no-ops when
      # the key already exists, so a dependency epoch is written once and then
      # reused untouched. See AGENTS.md → "CI & Security".
      - name: Save cabal store (main)
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ${{ github.workspace }}/.cabal
          key: cabal-store-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}

      - name: Save dist-newstyle (main)
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: dist-newstyle
          key: dist-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}

  smoke:
    name: Smoke tests (live registries — non-gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Hits public npm/PyPI to catch protocol drift when those registries change
    # their wire behaviour — a correctness signal we want visible on EVERY PR. NOT a
    # `gate` dependency and continue-on-error, so a transient live-registry blip
    # never reddens a run or blocks a merge, while a real drift still shows red on
    # the PR. Also runs post-merge on main and nightly (schedule). Now that the
    # dependency store is warm on PRs (restored from main), this no longer pays a
    # full dependency build — only the smoke suite's incremental compile + the live
    # calls. On promoting this to a required gate, see AGENTS.md → "CI & Security".
    continue-on-error: true
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      - name: Update package index
        run: nix develop .#ci --command make update

      - name: Smoke tests
        run: nix develop .#ci --command make test-smoke

  e2e:
    name: End-to-end tests (whole-system, real npm)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Stands the whole system up as the real OCI image + nginx stub + Verdaccio on a
    # docker network and drives it with the real npm CLI (S53). Catches composition-root
    # and cross-component regressions nothing else does. It is heavy (a Nix image build,
    # containers, npm) and runs as its own parallel job, but it is hermetic (no live
    # registry — unlike smoke) and has been reliably green, so it GATES: a `gate`
    # dependency, run on every PR and nightly. If its weight starts to hurt PR latency
    # or it turns flaky, the levers are nightly-only cadence or a larger runner before
    # dropping it from the gate. Uses the full dev shell (not `.#ci`) because the harness
    # needs the npm CLI on PATH. The disk-prep steps below free the small root partition
    # and move the Nix store + Docker data-root onto the ephemeral /mnt volume, since the
    # image build + `docker load` can exhaust root. See planning/slices/S53-e2e-ecosystem.md.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Free the ~14 GB root partition that the Nix image build + `docker load` can
      # exhaust. Removes preinstalled toolchains this pure-Nix job never touches —
      # the system GHC/ghcup, Android SDK, .NET, Swift — since npm/node and GHC all
      # come from the Nix dev shell. `df` before/after so a failing nightly shows the
      # actual reclaim. Done inline (not a third-party action) to honour the repo's
      # SHA-pin supply-chain convention. See planning/slices/S53-e2e-ecosystem.md.
      - name: Free disk space
        run: |
          echo "before:"; df -h / /mnt
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/share/swift \
            /opt/ghc \
            /usr/local/.ghcup
          echo "after:"; df -h / /mnt

      # Put the two biggest disk consumers on the ephemeral /mnt volume (~70 GB)
      # rather than the small root partition: the Nix store (bind-mounted now so the
      # image build's GHC closure lands on /mnt when "Set up toolchain" installs into
      # it) and the Docker data-root (so `docker load` of the OCI image + the running
      # containers do too). Both must precede their first use — the bind mount before
      # the toolchain install, the data-root before `make test-e2e`.
      - name: Relocate the Nix store and Docker data-root onto /mnt
        run: |
          sudo mkdir -p /mnt/nix /nix
          sudo mount --bind /mnt/nix /nix
          sudo systemctl stop docker.service docker.socket
          sudo mkdir -p /mnt/docker
          if [ -f /etc/docker/daemon.json ]; then
            sudo jq '. + {"data-root": "/mnt/docker"}' /etc/docker/daemon.json \
              | sudo tee /etc/docker/daemon.json.tmp >/dev/null
            sudo mv /etc/docker/daemon.json.tmp /etc/docker/daemon.json
          else
            echo '{"data-root": "/mnt/docker"}' | sudo tee /etc/docker/daemon.json >/dev/null
          fi
          sudo systemctl start docker.service
          docker info --format 'Docker root: {{.DockerRootDir}}'

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"
          # Never write the shared Nix-store cache: this job realizes the FULL dev
          # shell (a superset of the gating `.#ci` closure) and runs on the nightly
          # main schedule, so saving here would bloat and race the canonical entry
          # that build-test owns. Restore-only. See setup-toolchain's caching policy.
          save-nix-store: "false"

      - name: Update package index
        run: nix develop --command make update

      - name: End-to-end suite (builds + loads the image, drives the real npm CLI)
        run: nix develop --command make test-e2e

  static-checks:
    name: Static checks (format, lint, Semgrep, workflows)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Formerly four jobs (format/lint, cabal-check, Semgrep, workflow-lint). None
    # build Haskell, so each paid a full ~35s toolchain setup for a sub-minute
    # check. Merged so that setup is paid once. Each check runs even if an earlier
    # one failed (`if: !cancelled()`), so one run still reports them all; the job
    # fails if any check fails — identical gate semantics to the separate jobs.
    permissions:
      contents: read
      security-events: write # upload the Semgrep SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain

      # The purely-hermetic static tier — format, lint, cabal-check — runs as
      # first-class Nix flake checks (flake.nix → checks.<system>.*) rather than
      # `make` targets in a devshell, so CI points straight at the flake graph. The
      # checks are sandboxed (no ambient state), content-addressed (unchanged
      # sources are a store hit — no rerun), and pinned (they run the EXACT flake
      # fourmolu/hlint/cabal, so a stale ambient tool can't drift the result — the
      # failure mode AGENTS.md warns about). Locally: this same `nix build`, or
      # `nix flake check` for the whole graph. The runner is x86_64, hence the
      # hard-coded system; deriving it is a follow-up.
      #
      # These three are the WHOLE purely-hermetic static tier. The remaining gate
      # tiers (doctest, docs-check, build, the unit suite) all COMPILE the package,
      # which as a flake check goes through the Nix Haskell builder — a separate
      # compilation from the cabal/dist-newstyle path the build-test job uses, so
      # moving them trades that job's incremental rebuild for a second full build.
      # That is a deliberate decision to measure on its own, not a mechanical next
      # step. Semgrep + workflow-lint stay as `make` steps below: both reach the
      # network (rule registry / zizmor's online audit), so they can't be
      # offline-sandboxed checks.
      - name: Format, lint, cabal-check (flake checks)
        if: ${{ !cancelled() }}
        run: nix build .#checks.x86_64-linux.format .#checks.x86_64-linux.lint .#checks.x86_64-linux.cabal-check --no-link --print-build-logs

      - name: Semgrep scan
        if: ${{ !cancelled() }}
        # `make sast` runs the same Nix-pinned Semgrep developers use, with
        # --config auto (anonymous; rules fetched from the public Registry),
        # failing on ERROR/WARNING findings. It also writes semgrep.sarif.
        run: nix develop .#ci --command make sast

      - name: Upload Semgrep SARIF to code scanning
        # Surface findings in the Security tab, so the dashboard reflects
        # trunk's state rather than per-PR/branch alerts. Semgrep still GATES on every
        # PR (`make sast` fails on findings), so nothing slips through; this upload is
        # only the dashboard view, which should track main. always() so a run
        # still uploads even if an earlier step failed.
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Lint workflows (actionlint + zizmor)
        if: ${{ !cancelled() }}
        # actionlint (correctness) + zizmor (security). GH_TOKEN lets zizmor run
        # its online audits with the job's own read-only token; no secret needed.
        # Runs in the lean .#workflow-lint shell rather than .#ci.
        env:
          GH_TOKEN: ${{ github.token }}
        run: nix develop .#workflow-lint --command make lint-workflows

      - name: Lint shell scripts (shellcheck)
        if: ${{ !cancelled() }}
        # shellcheck over scripts/*.sh (--severity=warning). Same lean .#workflow-lint
        # shell as the workflow lint above. See CONTRIBUTING.md → "Automation scripting".
        run: nix develop .#workflow-lint --command make lint-scripts

      - name: Test shell scripts
        if: ${{ !cancelled() }}
        # Deterministic unit tests for the helper scripts (currently the Haddock
        # dependency-link rewriter's Hackage URL mapping). A full docs build is too
        # heavy to gate every PR, so this locks the mapping against the link shapes
        # cabal haddock emits. Same lean .#workflow-lint shell as the lint above.
        run: nix develop .#workflow-lint --command make test-scripts

  docs:
    name: Haddock builds
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Builds the library Haddock so broken doc comments / missing modules are caught
    # on the PR, not after merge when the Pages deploy fails. SPIKE: builds it as the
    # `checks.docs` flake check (Nix Haskell builder) rather than `cabal haddock`
    # (`make docs-check`). The cabal path rebuilt the whole ~188-package dependency
    # closure every run (~12 min), because `cabal haddock` wants a documentation
    # variant of the deps that build-test's `cabal build` store lacks; the flake check
    # takes the deps prebuilt from the pinned Haskell set, so only ecluse compiles +
    # haddocks (~44 s locally). Same validation — broken doc comments fail the build.
    # Restore-only Nix store (build-test stays the single writer); no cabal cache (the
    # build resolves deps via Nix, not cabal). The published, source-linked styling is
    # still built by the Pages publish (`make site`) on main.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          save-nix-store: "false"

      - name: Build library Haddock (checks.docs flake check)
        run: nix build .#checks.x86_64-linux.docs --no-link --print-build-logs

  weeder:
    name: Dead-code report (weeder — informational)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # INFORMATIONAL ONLY: not a `gate` dependency and never fails the run. weeder
    # reports library code not reachable from the application entry point, rendered
    # into the run summary. Runs on EVERY PR so a newly-introduced unreachable
    # definition is surfaced on the PR that adds it — where it's actionable — as well
    # as post-merge on main. Warm deps (restored from main) keep it cheap.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      # weeder builds the -fwrite-ide-info .hie variant into its own dist-weeder,
      # which the shared dist-newstyle doesn't cover. Restore-only on PRs (no per-PR
      # copies); the matching save below runs on main only — same single-writer
      # policy as every other cache. Keyed on the dependency plan.
      - name: Restore weeder build (dist-weeder)
        uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: dist-weeder
          key: dist-weeder-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            dist-weeder-${{ runner.os }}-

      - name: Update package index
        run: nix develop .#weeder --command make update

      - name: weeder (report to job summary)
        # weeder exits non-zero on findings; this tier is informational, so swallow
        # that and render the findings into the run summary instead.
        run: |
          nix develop .#weeder --command make weeder 2>&1 | tee weeder.out || true
          {
            echo '## weeder — library code not yet reachable from the app entry';
            echo;
            echo '_Informational; never gates. These are built/tested but not yet wired into the app entry (Ecluse.run) — feature scaffolding that shrinks as slices land._';
            echo;
            echo '```';
            grep -E ':[0-9]+:[0-9]+:' weeder.out || echo '(no findings)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save weeder build (dist-weeder, main)
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: dist-weeder
          key: dist-weeder-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}

  stan:
    name: Haskell static analysis (stan — fails, never gates)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # FAILS on findings (a visible red signal) but is NOT a `gate` dependency, so it
    # never blocks a merge — the same don't-touch-the-gate posture as weeder, except
    # weeder swallows its exit and this one surfaces it. Stan analyses GHC HIE files
    # for partial functions + potential bugs that Semgrep (no Haskell) and hlint (no
    # type info) can't see, scoped by .stan.toml to a Warning floor (Performance/Style
    # space-leak noise excluded; `make stan-all` shows the full set). Builds its own
    # dist-stan, like weeder. Warm deps (restored from main) keep it cheap.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      - name: Restore stan build (dist-stan)
        uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: dist-stan
          key: dist-stan-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            dist-stan-${{ runner.os }}-

      - name: Update package index
        run: nix develop .#stan --command make update

      # `make stan` exits non-zero on findings; pipefail (the runner's default) carries
      # that through `tee` so the job goes red, while the findings are still captured for
      # the summary. The gate never depends on this job, so red here never blocks a merge.
      - name: stan (fails on findings; non-gating)
        run: nix develop .#stan --command make stan 2>&1 | tee stan.out

      - name: Render stan findings to the run summary
        if: always()
        run: |
          {
            echo '## stan — Haskell static analysis (non-gating: fails the job, not the CI gate)';
            echo;
            echo 'Partial functions and potential bugs (HIE-based) at the Warning floor. Nothing is ignored without an explicit decision; run "make stan-all" locally for the full set incl Performance/space-leak.';
            echo;
            echo '```';
            sed -E 's/\x1b\[[0-9;]*m//g' stan.out 2>/dev/null || echo '(no output)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save stan build (dist-stan, main)
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: dist-stan
          key: dist-stan-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}

  gate:
    name: CI gate
    # The single Required check. Runs after every other gating job regardless of
    # result, and fails unless all of them succeeded. Wire new required checks in
    # by adding them to `needs` here — never as additional required checks. smoke
    # and weeder are intentionally absent: they run on PRs for visibility but are
    # non-gating, so the gate never waits on (or fails because of) them. e2e IS a
    # dependency: it runs as its own parallel job (hermetic, reliably green) and the
    # gate blocks on it.
    needs: [build-test, static-checks, docs, e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any dependency did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: exit 1

      - name: All checks passed
        run: echo "All required checks passed."
