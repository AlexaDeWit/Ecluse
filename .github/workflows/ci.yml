name: CI

# Run on pushes to main (post-merge verification) and on every PR; a
# feature-branch push no longer double-runs alongside its PR. Manual dispatch is
# kept for re-runs. Push runs therefore always use main's workflow definition;
# PR runs use the PR head's, by GitHub's design.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same ref on PRs/branches, but never on main —
# keep the complete, accurate build history of every commit that lands there.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least privilege by default: a read-only token. Jobs that need more (the
# coverage upload's OIDC) widen it at the job level.
permissions:
  contents: read

# All checks are jobs in this one graph and feed the terminal `gate` job, which
# is the single Required status check in branch protection (plus Codecov's
# server-side statuses; see CONTRIBUTING.md → "Coverage"). Setup actions are
# SHA-pinned once in .github/actions/setup-toolchain; CI enters the lean `.#ci`
# dev shell.
jobs:
  build-and-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # OIDC for tokenless Codecov upload (no stored token)
    env:
      # Pin the cabal store to a deterministic, cacheable location.
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      - name: Update package index
        run: nix develop .#ci --command make update

      # Build everything (all three test suites included) so a broken
      # integration/smoke suite fails the gate even when it isn't run here.
      - name: Build (library, executable, all test suites)
        run: nix develop .#ci --command make build

      - name: Unit tests
        run: nix develop .#ci --command make test

      # Run the >>> examples in Haddock comments as tests (doctest), reusing the
      # warm build above so documented examples can't drift from the code. Gates
      # through this job. See HADDOCK.md → "Examples that run".
      - name: Doctest (Haddock examples)
        run: nix develop .#ci --command make doctest

      # Instrumented re-run of the unit suite in a separate build dir, emitting
      # Codecov-native JSON. Only our small package recompiles (-fhpc); deps come
      # from the cached cabal store, so this is cheap.
      - name: Coverage (unit)
        run: nix develop .#ci --command make coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true # tokenless upload via GitHub OIDC; no CODECOV_TOKEN secret
          files: coverage/ecluse-unit.json
          flags: unit
          fail_ci_if_error: true # a lost upload must not silently skip the gate

  integration:
    name: Integration tests (ministack)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # ubuntu-latest ships a Docker daemon, which testcontainers/ministack use.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      - name: Update package index
        run: nix develop .#ci --command make update

      - name: Integration tests
        run: nix develop .#ci --command make test-integration

      # Integration-tier coverage uploads under its own Codecov flag, wired
      # exactly like the unit job. Enable once ecluse-integration has real cases
      # (today it is a stub, so an empty flag adds no signal). Enabling also needs
      # `permissions: { contents: read, id-token: write }` on this job.
      # - name: Coverage (integration)
      #   run: nix develop .#ci --command make coverage SUITE=ecluse-integration
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      #   with:
      #     use_oidc: true
      #     files: coverage/ecluse-integration.json
      #     flags: integration
      #     fail_ci_if_error: true

  smoke:
    name: Smoke tests (live registries — allowed to fail)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Hits public npm/PyPI; flaky by design. NOT a `gate` dependency, and
    # continue-on-error so a live-registry failure surfaces protocol drift
    # without ever reddening the run or blocking a merge.
    continue-on-error: true
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      - name: Update package index
        run: nix develop .#ci --command make update

      - name: Smoke tests
        run: nix develop .#ci --command make test-smoke

  static-checks:
    name: Static checks (format, lint, Semgrep, workflows)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Formerly four jobs (format/lint, cabal-check, Semgrep, workflow-lint). None
    # build Haskell, so each paid a full ~35s toolchain setup for a sub-minute
    # check. Merged so that setup is paid once. Each check runs even if an earlier
    # one failed (`if: !cancelled()`), so one run still reports them all; the job
    # fails if any check fails — identical gate semantics to the separate jobs.
    permissions:
      contents: read
      security-events: write # upload the Semgrep SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain

      - name: fourmolu (format check)
        if: ${{ !cancelled() }}
        run: nix develop .#ci --command make format-check

      - name: hlint
        if: ${{ !cancelled() }}
        run: nix develop .#ci --command make lint

      - name: cabal check (package metadata)
        if: ${{ !cancelled() }}
        run: nix develop .#ci --command make cabal-check

      - name: Semgrep scan
        if: ${{ !cancelled() }}
        # `make sast` runs the same Nix-pinned Semgrep developers use, with
        # --config auto (anonymous; rules fetched from the public Registry),
        # failing on ERROR/WARNING findings. It also writes semgrep.sarif.
        run: nix develop .#ci --command make sast

      - name: Upload Semgrep SARIF to code scanning
        # Surface findings in the Security tab. always() so findings that failed
        # the Semgrep step above still upload; skipped on fork PRs, whose read-only
        # token can't write security events.
        if: ${{ always() && github.event.pull_request.head.repo.fork != true }}
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Lint workflows (actionlint + zizmor)
        if: ${{ !cancelled() }}
        # actionlint (correctness) + zizmor (security). GH_TOKEN lets zizmor run
        # its online audits with the job's own read-only token; no secret needed.
        # Runs in the lean .#workflow-lint shell rather than .#ci.
        env:
          GH_TOKEN: ${{ github.token }}
        run: nix develop .#workflow-lint --command make lint-workflows

  docs:
    name: Haddock builds
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Builds the library Haddock (`make docs-check`) so broken doc comments / missing
    # modules are caught on the PR, not after merge when the Pages deploy fails. This
    # drops the expensive --haddock-hyperlink-source pass (the dominant cost) — the
    # full source-linked styling is built only by the Pages publish (`make docs-site`)
    # on main, whose deploy is non-gating. The compile + doc-comment validation here
    # is identical, so a green gate still predicts a successful publish.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      - name: Update package index
        run: nix develop .#ci --command make update

      - name: Build Haddock
        run: nix develop .#ci --command make docs-check

  weeder:
    name: Dead-code report (weeder — informational)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # INFORMATIONAL ONLY: not a `gate` dependency and never fails the run. weeder
    # reports library code not yet reachable from the application entry point —
    # deliberate scaffolding for upcoming slices — so this surfaces it (in the run
    # summary) without ever blocking a merge.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      - name: Update package index
        run: nix develop .#weeder --command make update

      - name: weeder (report to job summary)
        # weeder exits non-zero on findings; this tier is informational, so swallow
        # that and render the findings into the run summary instead.
        run: |
          nix develop .#weeder --command make weeder 2>&1 | tee weeder.out || true
          {
            echo '## weeder — library code not yet reachable from the app entry';
            echo;
            echo '_Informational; never gates. These are built/tested but not yet wired into the app entry (Ecluse.run) — feature scaffolding that shrinks as slices land._';
            echo;
            echo '```';
            grep -E ':[0-9]+:[0-9]+:' weeder.out || echo '(no findings)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

  gate:
    name: CI gate
    # The single Required check. Runs after every other gating job regardless of
    # result, and fails unless all of them succeeded. Wire new required checks in
    # by adding them to `needs` here — never as additional required checks. The
    # smoke job is intentionally absent: it is allowed to fail.
    needs: [build-and-test, integration, static-checks, docs]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any dependency did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: exit 1

      - name: All checks passed
        run: echo "All required checks passed."
