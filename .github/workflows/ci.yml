name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same ref on PRs/branches, but never on main —
# keep the complete, accurate build history of every commit that lands there.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# All checks are jobs in this one graph and feed the terminal `gate` job, which
# is the single Required status check in branch protection. Every action is
# pinned to a full commit SHA (Dependabot keeps them current).
jobs:
  build-and-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for tokenless Codecov upload (no stored token)
    env:
      # Pin the cabal store to a deterministic, cacheable location.
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Reproducible toolchain: CI uses the exact same dev shell as developers,
      # pinned by flake.lock. GHC/cabal come prebuilt from cache.nixos.org.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Cache cabal store & build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ github.workspace }}/.cabal
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('flake.lock', '**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Update package index
        run: nix develop --command make update

      # Build everything (all three test suites included) so a broken
      # integration/smoke suite fails the gate even when it isn't run here.
      - name: Build (library, executable, all test suites)
        run: nix develop --command make build

      - name: Unit tests
        run: nix develop --command make test

      # Instrumented re-run of the unit suite in a separate build dir, emitting
      # Codecov-native JSON. Only our small package recompiles (-fhpc); deps come
      # from the cached cabal store, so this is cheap.
      - name: Coverage (unit)
        run: nix develop --command make coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true # tokenless upload via GitHub OIDC; no CODECOV_TOKEN secret
          files: coverage/ecluse-unit.json
          flags: unit
          fail_ci_if_error: true # a lost upload must not silently skip the gate

  integration:
    name: Integration tests (ministack)
    runs-on: ubuntu-latest
    # ubuntu-latest ships a Docker daemon, which testcontainers/ministack use.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Cache cabal store & build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ github.workspace }}/.cabal
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('flake.lock', '**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Update package index
        run: nix develop --command make update

      - name: Integration tests
        run: nix develop --command make test-integration

      # Integration-tier coverage uploads under its own Codecov flag, wired
      # exactly like the unit job. Enable once ecluse-integration has real cases
      # (today it is a stub, so an empty flag adds no signal). Enabling also needs
      # `permissions: { contents: read, id-token: write }` on this job.
      # - name: Coverage (integration)
      #   run: nix develop --command make coverage SUITE=ecluse-integration
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      #   with:
      #     use_oidc: true
      #     files: coverage/ecluse-integration.json
      #     flags: integration
      #     fail_ci_if_error: true

  smoke:
    name: Smoke tests (live registries — allowed to fail)
    runs-on: ubuntu-latest
    # Hits public npm/PyPI; flaky by design. NOT a `gate` dependency, and
    # continue-on-error so a live-registry failure surfaces protocol drift
    # without ever reddening the run or blocking a merge.
    continue-on-error: true
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Cache cabal store & build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ github.workspace }}/.cabal
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('flake.lock', '**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Update package index
        run: nix develop --command make update

      - name: Smoke tests
        run: nix develop --command make test-smoke

  lint:
    name: Format & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: fourmolu (format check)
        run: nix develop --command make format-check

      - name: hlint
        run: nix develop --command make lint

  semgrep:
    name: Static analysis (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Semgrep scan
        # `make sast` runs the same Nix-pinned Semgrep developers use, with
        # --config auto (anonymous; rules fetched from the public Registry),
        # failing on ERROR/WARNING findings.
        run: nix develop --command make sast

  docs:
    name: Haddock builds
    runs-on: ubuntu-latest
    # Gates on the exact target the Pages workflow deploys (`make docs-site`), so
    # a green gate proves the published docs will build — broken doc comments are
    # caught on the PR, not after merge when the Pages deploy fails.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Cache cabal store & build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ github.workspace }}/.cabal
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('flake.lock', '**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Update package index
        run: nix develop --command make update

      - name: Build Haddock
        run: nix develop --command make docs-site

  gate:
    name: CI gate
    # The single Required check. Runs after every other gating job regardless of
    # result, and fails unless all of them succeeded. Wire new required checks in
    # by adding them to `needs` here — never as additional required checks. The
    # smoke job is intentionally absent: it is allowed to fail.
    needs: [build-and-test, integration, lint, semgrep, docs]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: exit 1

      - name: All checks passed
        run: echo "All required checks passed."
