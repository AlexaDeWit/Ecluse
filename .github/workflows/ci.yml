name: CI

# Run on pushes to main (post-merge verification) and on every PR; a
# feature-branch push no longer double-runs alongside its PR. Manual dispatch is
# kept for re-runs. The nightly schedule re-runs the workflow on main as a health
# check — most valuably the smoke tier, which catches live-registry protocol drift
# that lands independent of our commits. Push runs therefore always use main's
# workflow definition; PR runs use the PR head's, by GitHub's design.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * *" # nightly health check (most valuably the smoke tier)
  workflow_dispatch:

# Cancel superseded runs for the same ref on PRs/branches, but never on main —
# keep the complete, accurate build history of every commit that lands there.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least privilege by default: a read-only token. Jobs that need more (the
# coverage upload's OIDC) widen it at the job level.
permissions:
  contents: read

# All gating checks are jobs in this one graph and feed the terminal `gate` job,
# which is the single Required status check in branch protection (plus Codecov's
# server-side statuses; see docs/testing.md → "Coverage"). Setup actions are
# SHA-pinned once in .github/actions/setup-toolchain; CI enters the lean `.#ci`
# dev shell.
#
# Caching is restore-everywhere / SAVE-ONLY-ON-main: the heavy compiled-dependency
# store is built once on main and reused by every PR (which never write their own
# copies). build-test is the single writer. See AGENTS.md → "CI & Security" and the setup-toolchain action.
jobs:
  build-test:
    name: Build & tests (core-unit + app-unit + integration)
    # One job builds the project ONCE (library, executable, all three test
    # suites) and then runs every Haskell test tier against those same on-disk
    # artifacts — unit, integration, doctest, coverage. Previously build-and-test
    # and integration were separate jobs on separate runners, so the ~8-minute
    # dependency build ran twice per PR (and raced each other to populate one
    # shared, first-writer-wins cabal cache that ended up incomplete for the
    # widest plan). Building once, in one workspace, removes that whole class of
    # waste. Runs on ubuntu-latest, which ships the Docker daemon ministack /
    # testcontainers need for the integration tier.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # OIDC for tokenless Codecov upload (no stored token)
    env:
      # Pin the cabal store to a deterministic, cacheable location.
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      - name: Update package index
        run: nix develop .#ci --command task update

      # Warm the pinned Docker Hub images the integration coverage tier builds FROM
      # (ministack and the OTLP collector) into the local cache first, retrying a
      # transient Docker Hub pull timeout with backoff. The same throttled Docker
      # Hub IP pool that can wedge the e2e job reaches the integration tier through
      # its testcontainers `docker build FROM` here, so it gets the same buffer.
      # docker is a host binary (the data-root was relocated by "Set up toolchain");
      # the refs mirror the pins in test/integration/Ecluse/Integration/Ministack.hs
      # and the telemetry integration specs (the source of truth).
      - name: Pre-pull pinned integration images (Docker Hub throttle resilience)
        run: >-
          bash scripts/docker-prepull.sh
          ministackorg/ministack@sha256:5164592def36af01b8ac76364028e27c5ecd8f1494c8a53d5fcd811cc7dfb594
          otel/opentelemetry-collector@sha256:3805724e26351df55a45032a793c9b64a2117ac9a58f13f070674a9723fab373

      - name: Cabal checks (build, coverage, doctest, cabal-check)
        run: nix develop .#ci --command task cabal-checks

      - name: Upload core unit coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true # tokenless upload via GitHub OIDC; no CODECOV_TOKEN secret
          files: coverage/ecluse-core-unit.json
          flags: unit
          fail_ci_if_error: true # a lost upload must not silently skip the gate

      - name: Upload app unit coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true # tokenless upload via GitHub OIDC; no CODECOV_TOKEN secret
          files: coverage/ecluse-unit.json
          flags: unit
          fail_ci_if_error: true # a lost upload must not silently skip the gate

      - name: Upload runtime unit coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true # tokenless upload via GitHub OIDC; no CODECOV_TOKEN secret
          files: coverage/ecluse-runtime-unit.json
          flags: unit
          fail_ci_if_error: true # a lost upload must not silently skip the gate

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true # tokenless upload via GitHub OIDC; no CODECOV_TOKEN secret
          files: coverage/ecluse-integration.json
          flags: integration
          fail_ci_if_error: true # a lost upload must not silently skip the gate

      # ---- Cache writes: main only, single writer ---------------------------
      # This job is the sole writer of the cabal store + dist-newstyle caches, and
      # only from main. PRs restore these (from main's entries) but never save, so
      # they don't each leave a branch-scoped copy and blow the 10 GB quota.
      # !cancelled() so a warm store is still saved when a later tier (e.g.
      # integration) fails — the deps built fine and are worth caching. The store
      # is saved from the widest plan above, so the entry is complete. Keys match
      # the restore keys in setup-toolchain exactly. actions/cache/save no-ops when
      # the key already exists, so a dependency epoch is written once and then
      # reused untouched. See AGENTS.md → "CI & Security".
      - name: Save cabal store (main)
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.cabal
          key: cabal-store-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}

      - name: Save dist-newstyle (main)
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: dist-newstyle
          key: dist-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}

  smoke:
    name: Smoke tests (live registries — non-gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Hits public npm/PyPI to catch protocol drift when those registries change
    # their wire behaviour — a correctness signal we want visible on EVERY PR. NOT a
    # `gate` dependency and continue-on-error, so a transient live-registry blip
    # never reddens a run or blocks a merge, while a real drift still shows red on
    # the PR. Also runs post-merge on main and nightly (schedule). Now that the
    # dependency store is warm on PRs (restored from main), this no longer pays a
    # full dependency build — only the smoke suite's incremental compile + the live
    # calls. On promoting this to a required gate, see AGENTS.md → "CI & Security".
    continue-on-error: true
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      - name: Update package index
        run: nix develop .#ci --command task update

      - name: Smoke tests
        run: nix develop .#ci --command task test-smoke

  e2e:
    name: End-to-end tests (whole-system, real npm)
    runs-on: ubuntu-latest
    # A 60-minute SANITY bound, not a budget: the suite runs in ~15 minutes with a warm
    # Nix store. The old 30-minute cap left only ~15 minutes of headroom, and a single
    # cold dependency closure ate all of it: a run whose caches all reported hits still
    # rebuilt the hs-opentelemetry tree from source, spent 24 minutes in Nix, and was
    # killed before the suite executed a single test. Compiling upstream Haskell
    # dependencies is not a signal about the change under test, so it should not fail a
    # gate. Warming that closure so the cold path cannot happen is the real fix (#836);
    # this only stops a cache miss from reading as a red gate.
    timeout-minutes: 60
    # Stands the whole system up as the real OCI image + nginx stub + Verdaccio on a
    # docker network and drives it with the real npm CLI (S53). Catches composition-root
    # and cross-component regressions nothing else does. It is heavy (a Nix image build,
    # containers, npm) and runs as its own parallel job, but it is hermetic (no live
    # registry — unlike smoke) and has been reliably green, so it GATES: a `gate`
    # dependency, run on every PR and nightly. If its weight starts to hurt PR latency
    # or it turns flaky, the levers are nightly-only cadence or a larger runner before
    # dropping it from the gate. Uses the full dev shell (not `.#ci`) because the harness
    # needs the npm CLI on PATH. The shared "Set up toolchain" action frees the small root
    # partition and moves the Nix store + Docker data-root onto the ephemeral /mnt volume
    # (now shared by every toolchain job, so the benchmark jobs get the same headroom),
    # since the image build + `docker load` can exhaust root. See
    # planning/slices/S53-e2e-ecosystem.md.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"
          # Never write the shared Nix-store cache: this job realizes the FULL dev
          # shell (a superset of the gating `.#ci` closure) and runs on the nightly
          # main schedule, so saving here would bloat and race the canonical entry
          # that build-test owns. Restore-only. See setup-toolchain's caching policy.
          save-nix-store: "false"

      - name: Update package index
        run: nix develop --command task update

      # Warm the pinned Docker Hub images the e2e data plane pulls (ministack, the
      # OTLP collector, nginx, Verdaccio) into the local cache first, retrying a
      # transient Docker Hub auth/pull timeout with backoff. The unauthenticated
      # runners share a throttled Docker Hub IP pool whose auth-token endpoint
      # intermittently times out, and a single throttled pull inside the suite's
      # setup hook cascades every case to pending and reddens this gating job. With
      # the images pre-warmed, the harness's own `docker run` finds them cached.
      # docker is a host binary here (no nix shell needed) and the data-root was
      # relocated by "Set up toolchain" above. The refs mirror the pins in
      # test/e2e/Ecluse/E2E/Harness/Docker.hs (the source of truth); digest pins are
      # copied verbatim, so this adds no new trust surface.
      - name: Pre-pull pinned e2e images (Docker Hub throttle resilience)
        run: >-
          bash scripts/docker-prepull.sh
          ministackorg/ministack@sha256:5164592def36af01b8ac76364028e27c5ecd8f1494c8a53d5fcd811cc7dfb594
          otel/opentelemetry-collector@sha256:3805724e26351df55a45032a793c9b64a2117ac9a58f13f070674a9723fab373
          verdaccio/verdaccio@sha256:9d622d256378c6e7ae09f384774ee2f0f8ac67a66c066db55921a0b7218abc4c
          nginx@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa

      - name: End-to-end suite (builds + loads the image, drives the real npm CLI)
        run: nix develop --command task test-e2e

  static-checks:
    name: Static checks (format, lint, Semgrep, workflows, site)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Formerly four jobs (format/lint, cabal-check, Semgrep, workflow-lint). None
    # build Haskell, so each paid a full ~35s toolchain setup for a sub-minute
    # check. Merged so that setup is paid once. Each check runs even if an earlier
    # one failed (`if: !cancelled()`), so one run still reports them all; the job
    # fails if any check fails — identical gate semantics to the separate jobs.
    # `task static-checks` also runs `site-stub`: the pandoc site assembled over
    # stubbed API artefacts plus the site link/metadata gates, so a dangling link
    # or orphaned page fails the PR here instead of the Pages deploy after merge.
    permissions:
      contents: read
      security-events: write # upload the Semgrep SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Static checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: nix develop --command task static-checks

      - name: Upload Semgrep SARIF to code scanning
        # Surface findings in the Security tab, so the dashboard reflects
        # trunk's state rather than per-PR/branch alerts. Semgrep still GATES on every
        # PR (`task sast` fails on findings), so nothing slips through; this upload is
        # only the dashboard view, which should track main. always() so a run
        # still uploads even if an earlier step failed.
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  docs:
    name: Haddock builds
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Builds the library Haddock so broken doc comments / missing modules are caught
    # on the PR, not after merge when the Pages deploy fails. Builds it as the
    # `checks.docs` flake check (Nix Haskell builder) rather than `cabal haddock`
    # (`task docs-check`). The cabal path rebuilt the whole ~188-package dependency
    # closure every run (~12 min), because `cabal haddock` wants a documentation
    # variant of the deps that build-test's `cabal build` store lacks; the flake check
    # takes the deps prebuilt from the pinned Haskell set, so only ecluse compiles +
    # haddocks. Same validation — broken doc comments fail the build. The published,
    # source-linked styling is still built by the Pages publish (`task site`) on main.
    #
    # DEDICATED Nix-store cache. The shared "nix" entry build-test writes holds the
    # `.#ci` shell closure, which lacks the dependency `-doc` outputs `checks.docs`
    # links against — so on the shared, restore-only store this job rebuilt that whole
    # doc closure every run (~6.7 min). It owns a separate "nix-docs" entry instead:
    # the full doc-closure build is ~6.55 GB (measured), so the trim cap is raised to
    # 7 G (the default 5 G would trim the closure away before saving, and it would
    # never persist). This job is the single writer of that key (save on main only),
    # so there is no race with build-test's "nix" entry. Warm runs then rebuild only
    # ecluse + ecluse-core. The cache-cleanup sweep keeps one epoch per nix- prefix.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Build library Haddock (checks.docs flake check)
        run: nix build .#checks.x86_64-linux.docs --no-link --print-build-logs

  weeder:
    name: Dead-code check (weeder)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Fails on any finding (a red signal) and IS a `gate` dependency, so a finding
    # blocks the merge. weeder reports library code not reachable from the application
    # entry point. Runs on EVERY PR so a newly-introduced unreachable definition is
    # caught on the PR that adds it. Runs as its own parallel job (a heavy
    # -fwrite-ide-info build), not folded into static-checks. Warm deps (restored from
    # main) keep it cheap.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      # dist-analysis (the shared -fwrite-ide-info builddir that `task weeder` builds
      # via analysis-build) is deliberately NOT cached: it is rebuilt from scratch
      # each run. weeder scans every .hie under it, and cabal cannot delete the
      # artifacts of removed source files, so any restored builddir risks feeding
      # weeder orphaned .hie for modules that no longer exist. That is a false red,
      # or a false green now that weeder gates (the same staleness measured on stan:
      # 132 observations against a true floor of 35, 140 modules scanned where the
      # tree had 122). The dependency closure still comes warm from the cabal-store
      # cache, so a cold builddir is only the first-party packages, a few minutes. Do
      # not reintroduce a dist-analysis cache without a per-run orphan-.hie prune:
      # keying on the source tree alone does not clean a restored builddir.
      #
      # This job and the stan job below run on separate runners, so each still pays
      # for its own build. Sharing the builddir buys nothing here; it is `task check`
      # locally, where the two run in one checkout, that it saves a build (#826).
      - name: Update package index
        run: nix develop .#weeder --command task update

      - name: weeder (fails on findings)
        run: |
          set -eo pipefail
          nix develop .#weeder --command task weeder 2>&1 | tee weeder.out

      - name: Render weeder findings to the run summary
        if: always()
        run: |
          {
            echo '## weeder: library code not reachable from the app entry';
            echo;
            echo '_Gating: any finding fails this job and the CI gate. A finding is a definition built into the library but not wired into the app entry (Ecluse.run); land its wiring in the same slice, or root it in weeder.toml._';
            echo;
            echo '```';
            grep -E ':[0-9]+:[0-9]+:' weeder.out || echo '(no findings)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

  stan:
    name: Haskell static analysis (stan)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Fails on any finding above the floor (a red signal) and IS a `gate` dependency,
    # so a finding blocks the merge. Stan analyses GHC HIE files for partial functions +
    # potential bugs that Semgrep (no Haskell) and hlint (no type info) can't see, scoped
    # by .stan.toml to a Warning floor. Runs as its own parallel job (a heavy
    # -fwrite-ide-info build into dist-analysis, like weeder), not folded into
    # static-checks. Warm deps (restored from main) keep it cheap.
    env:
      CABAL_DIR: ${{ github.workspace }}/.cabal
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cabal-cache: "true"

      # dist-analysis is deliberately NOT cached here either, for the reason spelled
      # out on the weeder job above: stan scans every .hie under the builddir, cabal
      # cannot delete the artifacts of removed source files, and a restored builddir
      # would hand stan orphaned .hie for modules that no longer exist (the staleness
      # that once reported 132 observations against a true floor of 35). The
      # dependency closure comes warm from the cabal-store cache, so a fresh builddir
      # is only the first-party packages.
      - name: Update package index
        run: nix develop .#stan --command task update

      - name: stan (fails on findings)
        run: |
          set -eo pipefail
          nix develop .#stan --command task stan 2>&1 | tee stan.out

      - name: Render stan findings to the run summary
        if: always()
        run: |
          {
            echo '## stan: Haskell static analysis (gating: any finding above the floor fails this job and the CI gate)';
            echo;
            echo 'Partial functions and potential bugs (HIE-based) at the Warning floor. Nothing is ignored without an explicit decision; run "task stan-all" locally for the full set incl Performance/space-leak.';
            echo;
            echo '```';
            sed -E 's/\x1b\[[0-9;]*m//g' stan.out 2>/dev/null || echo '(no output)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

  gate:
    name: CI gate
    # The single Required check. Runs after every other gating job regardless of
    # result, and fails unless all of them succeeded. Wire new required checks in
    # by adding them to `needs` here, never as additional required checks. smoke
    # is intentionally absent: it runs on PRs for visibility but is non-gating, so
    # the gate never waits on (or fails because of) it. e2e IS a dependency: it runs
    # as its own parallel job (hermetic, reliably green) and the gate blocks on it.
    # weeder and stan are dependencies too: each is its own parallel -fwrite-ide-info
    # job, and a dead-code or static-analysis finding above the floor blocks the merge.
    needs: [build-test, static-checks, docs, e2e, weeder, stan]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any dependency did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: exit 1

      - name: All checks passed
        run: echo "All required checks passed."
