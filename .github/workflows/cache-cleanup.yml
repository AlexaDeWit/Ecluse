name: Cache cleanup

# Keep the repo's GitHub Actions cache comfortably under the 10 GB quota.
#
# The CI workflow already does the heavy lifting by SAVING caches only on main
# (PRs restore but never write — see setup-toolchain), so the day-to-day churn of
# branch-scoped copies is gone. This workflow is the housekeeping backstop that
# handles what that policy can't, on a schedule:
#
#   * stragglers on non-main refs — anything a non-main run left behind (e.g. an
#     entry from a deleted/after-merge branch); and
#   * superseded main entries — once a dependency epoch advances (flake.lock /
#     cabal.project / cabal.project.freeze change), the previous epoch's
#     immutable-keyed cabal-store / dist-* / nix entries are dead weight.
#
# It keeps the newest KEEP_PER_PREFIX entries per key prefix on main (current +
# one fallback for in-flight runs and quick rollback) and deletes the rest. The
# heavy single-epoch caches keep only KEEP_DOCS instead — the Pages doc-variant
# caches (`-docs-` prefixes) and the Nix-store closures (`nix-*` prefixes, incl. the
# docs job's `nix-docs-*` doc closure): they are the biggest entries (~1 GB each),
# change only on a dependency/flake bump, and each has a single writer, so a second
# epoch buys little (see prune-caches.sh). Deleting caches needs `actions: write`;
# everything else is least-privilege.

on:
  schedule:
    - cron: "42 3 * * *" # daily, 03:42 UTC (before the 04:17 CI nightly)
  workflow_dispatch:

concurrency:
  group: cache-cleanup
  cancel-in-progress: false

permissions: {}

jobs:
  prune:
    name: Prune Actions cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # checkout, to run scripts/prune-caches.sh
      actions: write # delete caches via the REST API
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      KEEP_PER_PREFIX: "2" # newest N per key prefix to retain on main
      KEEP_DOCS: "1" # the heavy Pages `-docs-` caches retain only the current epoch
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Prune superseded and off-main caches
        run: |
          set -euo pipefail

          # All caches: id, ref, key, created_at — one TSV row each, across pages.
          gh api --paginate "repos/$REPO/actions/caches?per_page=100" \
            --jq '.actions_caches[] | [.id, .ref, .key, .created_at] | @tsv' \
            > caches.tsv || true

          if [ ! -s caches.tsv ]; then
            echo "No caches found; nothing to prune."
            exit 0
          fi

          # Decide which ids to delete. The selection logic (off-main stragglers +
          # superseded-epoch pruning, keyed on the prefix with the trailing hashFiles
          # digest stripped) lives in scripts/prune-caches.sh — reviewable, lintable,
          # and runnable outside CI. It reads the TSV on stdin and writes the ids to
          # delete on stdout.
          bash scripts/prune-caches.sh < caches.tsv > to-delete.txt

          count=$(wc -l < to-delete.txt | tr -d ' ')
          echo "Caches to delete: $count"
          if [ "$count" -eq 0 ]; then
            echo "Cache already within retention policy."
            exit 0
          fi

          while read -r id; do
            [ -n "$id" ] || continue
            echo "Deleting cache id=$id"
            gh api -X DELETE "repos/$REPO/actions/caches/$id" >/dev/null \
              && echo "  deleted" \
              || echo "  (already gone)"
          done < to-delete.txt

      - name: Report remaining usage
        if: ${{ always() }}
        run: |
          set -euo pipefail
          gh api "repos/$REPO/actions/cache/usage" \
            --jq '"Active caches: \(.active_caches_count)  —  \(.active_caches_size_in_bytes / 1e9 | (.*100|floor)/100) GB / 10 GB"' \
            >> "$GITHUB_STEP_SUMMARY"
