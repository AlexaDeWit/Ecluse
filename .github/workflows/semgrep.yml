name: Semgrep

on:
  push:
  pull_request:

jobs:
  semgrep:
    name: Static analysis (Semgrep OSS)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Semgrep scan
        # Auto config: Semgrep fetches rules relevant to this repo from the public
        # Registry (no SEMGREP_APP_TOKEN required; enables anonymous metrics).
        # Fail the job on ERROR- and WARNING-level findings.
        run: >
          semgrep scan
          --config auto
          --severity ERROR
          --severity WARNING
          --error
