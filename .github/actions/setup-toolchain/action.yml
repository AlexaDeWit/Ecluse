name: Set up toolchain
description: >-
  Install the flake-pinned Nix, restore the Nix store from the GitHub Actions
  cache, and (optionally) the cabal store + build dir. Centralises the SHA-pinned
  setup actions and cache config so every CI job shares one definition. Pins are
  bumped by Dependabot here, in one place. See AGENTS.md → "CI & Security".

  CACHING POLICY — restore everywhere, SAVE ONLY ON main. Every cache here is
  restore-only on PR/feature branches; the canonical entries are written solely
  by main's runs (the Nix store via cache-nix-action's `save:` guard below; the
  cabal store + dist-newstyle by the build-test job's explicit save steps). GitHub
  lets a PR restore caches from its base branch, so PRs still get a fully warm
  toolchain — they just never create their own branch-scoped copies. That one
  rule is what keeps the repo under the 10 GB cache ceiling: previously every PR
  saved its own ~1.3 GB Nix store + ~0.3 GB cabal cache, so a handful of open PRs
  filled the quota and evicted main's caches. See AGENTS.md → "CI & Security".

inputs:
  cabal-cache:
    description: >-
      Also restore the cabal store + dist-newstyle. Enable for jobs that build
      Haskell (build/test, docs, smoke, weeder); leave off for the
      fourmolu/hlint/Semgrep/workflow-lint checks, which don't.
    default: "false"
  save-nix-store:
    description: >-
      Whether this job may SAVE the Nix-store cache (only ever on main). Default
      true. Set "false" for a non-writer job that should restore the shared store
      but never write it — e.g. the Pages publish, which runs on main concurrently
      with build-test (the single writer) and must not race it for the one
      nix-<os>-<flakehash> entry.
    default: "true"
  nix-cache-prefix:
    description: >-
      The Nix-store cache key prefix. Default "nix" — the shared store every gate
      job realizes the `.#ci` shell into, written by build-test (the single
      writer). A job that builds a LARGER, distinct closure sets its own prefix so
      it neither collides with nor races that shared entry — e.g. the `docs` job
      uses "nix-docs" for the Haddock doc-closure (the dependency `-doc` outputs
      the `.#ci` store lacks), of which it is then the sole writer. The cache-cleanup
      sweep keeps only the current epoch of every `nix-` prefix (see prune-caches.sh).
    default: "nix"
  nix-gc-max-store-size:
    description: >-
      Cap the Nix store is trimmed to before saving (cache-nix-action
      gc-max-store-size-linux). Default "5G" — fits the `.#ci` dev-shell closure.
      A job whose closure is larger raises it so the closure survives the trim and
      actually persists; the `docs` job sets "7G" for the ~6.55 GB doc closure
      (measured). Mind the 10 GB Actions-cache quota when raising it.
    default: "5G"

runs:
  using: composite
  steps:
    # Reproducible toolchain: the exact flake-pinned dev shell developers use.
    # extra-conf hardens substitution against transient cache.nixos.org hiccups
    # — the cold path; warm runs restore the store from the cache below and skip
    # the upstream substituter entirely.
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      with:
        extra-conf: |
          connect-timeout = 10
          download-attempts = 5

    # Restore /nix/store from the GitHub Actions cache, keyed on the flake, so
    # warm runs are fast and immune to cache.nixos.org flakiness. Most gate jobs
    # realize the same `.#ci` shell, so the default "nix" prefix serves them from
    # one shared entry; a job with a larger, distinct closure (the `docs` job's
    # Haddock doc-closure) overrides nix-cache-prefix to own a separate entry.
    #
    # save is gated to main AND to the save-nix-store input: PR runs restore (from
    # main's entry, via the base-branch fallback) but never write, so they can't
    # each leave a ~1.3 GB copy behind; and a non-writer main job (Pages, which sets
    # save-nix-store: false) restores the shared store but never races build-test —
    # the single writer — for the one nix-<os>-<flakehash> entry. gc-max-store-size
    # trims the store to its live closure before saving, so the cached entry can't
    # balloon past that job's closure. Stale older-flake.lock entries are pruned
    # by the cache-cleanup workflow (this token is read-only; purging in-action
    # would need `actions: write`).
    - name: Cache Nix store
      uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
      with:
        primary-key: ${{ inputs.nix-cache-prefix }}-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: ${{ inputs.nix-cache-prefix }}-${{ runner.os }}-
        save: ${{ inputs.save-nix-store == 'true' && github.ref == 'refs/heads/main' }}
        gc-max-store-size-linux: ${{ inputs.nix-gc-max-store-size }}

    # Hackage deps are built by cabal into CABAL_DIR (the store + the package
    # index), outside /nix/store, so they need their own cache. RESTORE ONLY — the
    # build-test job is the single writer (on main), populating it from the widest
    # plan (`cabal build all --enable-tests`) so every consumer job's narrower plan
    # is fully covered. Keyed on the dependency *plan* inputs — flake.lock (the GHC)
    # + cabal.project (index-state, constraints) + cabal.project.freeze (the exact
    # version lock) — NOT `**/*.cabal`, which changed on ~half of recent commits
    # (adding a module/source file) and needlessly churned a fresh ~0.3 GB entry
    # each time while never actually changing the resolved dependency set.
    - name: Restore cabal store
      if: inputs.cabal-cache == 'true'
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ${{ github.workspace }}/.cabal
        key: cabal-store-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}
        restore-keys: |
          cabal-store-${{ runner.os }}-

    # The project's own incremental build products (changed-module recompiles only).
    # Same dep-plan key, separate from the store: the store is the heavy, slow-moving
    # part (180 compiled deps); dist-newstyle is small and fast-moving. Restore-only,
    # written by build-test on main. The deps live in the store above, so a
    # restore-keys fallback to a slightly older dist-newstyle only recompiles the
    # changed local modules (~12k LoC) — never the dependency closure.
    - name: Restore dist-newstyle
      if: inputs.cabal-cache == 'true'
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: dist-newstyle
        key: dist-${{ runner.os }}-${{ hashFiles('flake.lock', 'cabal.project', 'cabal.project.freeze') }}
        restore-keys: |
          dist-${{ runner.os }}-
