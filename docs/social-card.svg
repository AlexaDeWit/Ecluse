<?xml version="1.0" encoding="UTF-8"?>
<!--
  Écluse — social media / Open Graph card (1200×630, the 1.91:1 link-share size).
  Same hand-authored artwork as docs/social-preview.svg, re-fitted to 1200×630:
  the lock section + wordmark are wrapped in a single translate so the wordmark
  re-centres on the narrower canvas. Original vector; no third-party assets.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"
     viewBox="0 0 1200 630" role="img"
     aria-label="Écluse — supply-chain resilience proxy for package registries">
  <title>Écluse</title>
  <desc>A package crate in the low chamber of a canal lock; the closed gate holds back the higher pound beyond.</desc>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#211F1C" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- drafting paper + faint grid + sheet edge -->
  <rect width="1200" height="630" fill="#F4EFE3"/>
  <rect x="24" y="24" width="1152" height="582" fill="url(#grid)"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#211F1C" stroke-width="1.6"/>

  <!-- art + text, shifted to re-centre on the 1200-wide canvas -->
  <g transform="translate(-40,-5)">

    <!-- ════════ THE LOCK, in section: package in the low chamber, gate holding the pound ════════ -->
    <g fill="none" stroke="#211F1C" stroke-linejoin="round">

      <!-- ground the walls are set into (a whisper) -->
      <g stroke-width="1.4" stroke-opacity="0.55">
        <line x1="150" y1="140" x2="196" y2="140"/>
        <line x1="1104" y1="140" x2="1130" y2="140"/>
      </g>

      <!-- chamber: far wall, floor, end wall (the section) -->
      <g stroke-width="2.4">
        <line x1="196" y1="140" x2="196" y2="372"/>
        <line x1="196" y1="372" x2="1104" y2="372"/>
        <line x1="1104" y1="140" x2="1104" y2="372"/>
      </g>

      <!-- the gate: a braced timber leaf, closed, from coping to floor -->
      <g stroke-width="2.4">
        <line x1="694" y1="140" x2="694" y2="372"/>
        <line x1="706" y1="140" x2="706" y2="372"/>
        <line x1="694" y1="140" x2="706" y2="140"/>
      </g>
      <g stroke-width="1.4">
        <line x1="694" y1="222" x2="706" y2="222"/>
        <line x1="694" y1="286" x2="706" y2="286"/>
        <line x1="694" y1="344" x2="706" y2="344"/>
        <line x1="694" y1="366" x2="706" y2="210"/>   <!-- diagonal brace -->
      </g>

      <!-- balance beam: the heavy timber lever lying out over the coping -->
      <line x1="700" y1="141" x2="556" y2="129" stroke-width="6" stroke-linecap="round"/>

      <!-- water: the step is the tell — low in the chamber, high in the pound -->
      <g stroke-width="1.8">
        <line x1="706" y1="192" x2="1104" y2="192"/>   <!-- pound (high) -->
        <line x1="196" y1="306" x2="330" y2="306"/>    <!-- chamber (low), split -->
        <line x1="510" y1="306" x2="694" y2="306"/>    <!-- around the crate -->
      </g>
      <g stroke-width="1" stroke-opacity="0.4">
        <line x1="760" y1="210" x2="1056" y2="210"/>
        <line x1="820" y1="226" x2="1000" y2="226"/>
        <line x1="212" y1="322" x2="296" y2="322"/>
        <line x1="576" y1="322" x2="680" y2="322"/>
      </g>

      <!-- a package in transit through the lock: a wooden crate afloat in the chamber -->
      <g stroke-width="2">
        <path d="M330 218 L470 218 L510 192 L370 192 Z"/>   <!-- lid (top face) -->
        <path d="M470 218 L510 192 L510 294 L470 320 Z"/>   <!-- right side face -->
        <path d="M330 218 L470 218 L470 320 L330 320 Z"/>   <!-- front face -->
      </g>
      <g stroke-width="1.4">
        <line x1="330" y1="320" x2="470" y2="218"/>   <!-- diagonal brace (rhymes with the gate) -->
        <line x1="330" y1="269" x2="470" y2="269"/>   <!-- plank seam -->
        <line x1="377" y1="218" x2="417" y2="192"/>   <!-- lid slats -->
        <line x1="424" y1="218" x2="464" y2="192"/>
        <line x1="470" y1="250" x2="510" y2="224"/>   <!-- side slats -->
        <line x1="470" y1="288" x2="510" y2="262"/>
      </g>
      <rect x="344" y="230" width="40" height="24" stroke-width="1.2"/>   <!-- shipping label -->
    </g>

    <!-- ════════ wordmark + tagline (the only text) ════════ -->
    <text x="640" y="492" text-anchor="middle"
          font-family="'EB Garamond','Cormorant Garamond',Georgia,'Times New Roman',serif"
          font-size="82" font-weight="600" letter-spacing="1" fill="#211F1C">Écluse</text>
    <text x="640" y="530" text-anchor="middle"
          font-family="'Inter','Helvetica Neue',Arial,sans-serif"
          font-size="16" letter-spacing="2" fill="#5A564E">SUPPLY-CHAIN RESILIENCE PROXY FOR PACKAGE REGISTRIES</text>
  </g>
</svg>
