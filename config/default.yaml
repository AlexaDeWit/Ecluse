# Production default settings
port: 8080
queueBackend: sqs # default to sqs for production, switch to memory for local dev if desired
queueMemoryMaxDepth: 50000
cveSyncInterval: 3600
# How often the proxy polls object storage for a fresh advisory database (a cheap
# ETag HEAD). Deliberately independent of, and much more frequent than, Pilot's
# cveSyncInterval: matching them would nearly double the worst-case advisory age.
cveDbPollInterval: 60
# Refuse to download an advisory database larger than this many bytes (512 MiB).
maxOsvDbBytes: 536870912
shutdownDrainTimeout: 30
# serveMaxInFlight is deliberately NOT pinned here: omitted, it is computed at boot
# from the resolved capability count (max(8, 4 x capabilities); see
# Ecluse.Composition.resolveServeAdmission). Set it (or ECLUSE_SERVE_MAX_IN_FLIGHT)
# only to override the computed default. privateConnectionsPerHost is likewise NOT
# pinned: omitted, the private-upstream connection pool is computed at boot from the
# process file-descriptor limit (a quarter of RLIMIT_NOFILE, clamped to 64..4096; see
# Ecluse.Composition.resolvePrivateConnections), sized for the un-admitted private-hit
# streaming fan-out rather than the admission capacity. Set
# ECLUSE_PRIVATE_CONNECTIONS_PER_HOST only to override it.
cacheTtl: 60
cacheMaxEntries: 1024
cacheMaxBytes: 268435456
maxResponseBytes: 12582912
maxVersionCount: 100000
maxNestingDepth: 64
logFormat: json
telemetry: "off"
minPublicIntegrity: sha256
minTrustedIntegrity: sha256
osvDataDir: "data/osv"
# Base URL of the per-ecosystem OSV advisory exports Pilot compiles from
# (<base>/<ecosystem>/all.zip). Override it if the upstream moves or you mirror it;
# a new URL must never require a new Ecluse binary.
osvExportBaseUrl: "https://osv-vulnerabilities.storage.googleapis.com"

mounts:
  npm:
    publicUpstream: https://registry.npmjs.org
    credentialProvider: codeartifact
    respectUpstreamTarballHost: false
  pypi:
    publicUpstream: https://pypi.org
    credentialProvider: codeartifact
    respectUpstreamTarballHost: false
  rubygems:
    publicUpstream: https://rubygems.org
    credentialProvider: codeartifact
    respectUpstreamTarballHost: false

rules:
  min-age:
    type: AllowIfOlderThan
    precedence: 100
    ageSeconds: 604800
  # The remediation fast lane: a version a synced advisory names as its exact fix
  # is admitted ahead of the min-age quarantine. With no advisory database
  # configured (no vulnerabilityDatabaseBucket) it abstains and only the
  # quarantine governs.
  remediation-fast-track:
    type: AllowIfRemediatesCve
    precedence: 150
