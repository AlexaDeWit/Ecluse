# Stan configuration for Écluse. The `stan` CI job runs Stan at this floor and FAILS
# on any finding (a visible red signal), but it is NOT a CI-gate dependency, so it
# never blocks a merge. `make stan` reproduces it; `make stan-all` shows the full set,
# including the Style findings this floor drops.
#
# Beyond whole-inspection EXCLUDEs, this file carries a small, explicit `ignore` list of
# individual findings — each an accepted, recorded decision pinned to its source line for
# review, never a silent blanket suppression. Real findings are meant to fail the job and
# be triaged (fixed at source, or ignored only by such an explicit decision).
#
# Floor: drop the Style severity (cosmetic opinions we have not adopted). Performance is
# ARMED: STAN-0206 ("non-strict fields") is green since we adopted StrictData, and the
# STAN-0208 ("slow Text length") findings were rewritten at source (length-free
# comparisons / T.span / T.null). What stays armed across the whole tree is the safety
# signal: partial functions (#Partial) and potential bugs (#Infinite, Foldable footguns;
# #PotentialBug), plus the Performance severity.
#
# STAN-0213 (wildcard `_` on sum types) is excluded by explicit decision: reviewed, its
# findings here are correct deny-by-default catch-alls on lists / Maybe / aeson Value,
# and enforcing "no `_` on sum types" is totality-maximalism we deliberately don't adopt.
check =
  [ { type = "Exclude", severity = "Style", scope = "all" }
  , { type = "Exclude", id = "STAN-0213", scope = "all" }
  ]

# `length` on lists finite by construction (STAN-0103 diverges only on infinite lists);
# each id pinned to its source for review.
[[ignore]]
  id = "OBS-STAN-0103-pTUbUb-441:27"  # Security.hs:441 `length hd` — head half of a parsed IPv6 address (<= 8 groups)
[[ignore]]
  id = "OBS-STAN-0103-pTUbUb-441:39"  # Security.hs:441 `length tl` — tail half of that same address
[[ignore]]
  id = "OBS-STAN-0103-pTUbUb-481:22"  # Security.hs:481 `length gs == 8` — gs is the fixed 8-group IPv6 split; this IS the well-formedness check
[[ignore]]
  id = "OBS-STAN-0103-O2rrhR-384:19"  # Cache.hs:384 `length ks` — the metadata cache's current key set, bounded by its max-entries cap
