# HLint configuration — security-oriented restrictions on top of HLint's default
# hint set (we keep all the built-in suggestions; the entries below only ADD
# rules). The dev shell pins HLint via flake.lock; run `make lint`.
#
# The theme is totality: a supply-chain resilience proxy must not crash on
# hostile input, so partial functions (those that can throw on some inputs) are
# banned outright. Most are already hidden by `relude` (our prelude); these
# restrictions are defence-in-depth for when they are reached for via a
# qualified import (e.g. `Data.List.head`). See STYLE.md → "Totality".
#
# To permit a banned function in one specific module, add that module to its
# `within:` list with a comment justifying why it is safe there — never relax a
# rule globally without the repo owner's sign-off.

# --- Partial functions: banned everywhere -----------------------------------
- functions:
    - {name: undefined, within: [], message: "Partial: replace with a real value or a total error path."}
    - {name: error, within: [], message: "Don't crash the service: return Either/Maybe or encode the impossibility in the types. For a genuinely unreachable branch, see STYLE.md section 10 (the per-declaration HLint-ignore escape hatch)."}
    - {name: Prelude.head, within: [], message: "Partial on []: use 'viaNonEmpty head', pattern match, or 'listToMaybe'."}
    - {name: Prelude.tail, within: [], message: "Partial on []: pattern match or use 'drop 1'."}
    - {name: Prelude.init, within: [], message: "Partial on []: pattern match instead."}
    - {name: Prelude.last, within: [], message: "Partial on []: use 'viaNonEmpty last' or pattern match."}
    - {name: Prelude.!!, within: [], message: "Partial index: use a safe lookup ('!!?' from relude / 'atMay')."}
    - {name: Prelude.foldr1, within: [], message: "Partial on []: use 'foldr' with an explicit base case."}
    - {name: Prelude.foldl1, within: [], message: "Partial on []: use 'foldl'' with an explicit base case."}
    - {name: Prelude.maximum, within: [], message: "Partial on []: guard for emptiness or use a NonEmpty."}
    - {name: Prelude.minimum, within: [], message: "Partial on []: guard for emptiness or use a NonEmpty."}
    - {name: Prelude.cycle, within: [], message: "Partial on []: handle the empty case explicitly."}
    - {name: Data.Maybe.fromJust, within: [], message: "Partial on Nothing: pattern match or use 'fromMaybe'."}
    - {name: Prelude.read, within: [], message: "Partial parse: use 'readMaybe' and handle the failure."}
    - {name: Text.Read.read, within: [], message: "Partial parse: use 'readMaybe' and handle the failure."}

# --- Unsafe escapes: banned everywhere --------------------------------------
- functions:
    - {name: System.IO.Unsafe.unsafePerformIO, within: [], message: "Unsafe: keep IO in IO; do not smuggle effects into pure code."}
    - {name: Unsafe.Coerce.unsafeCoerce, within: [], message: "Unsafe: defeats the type system."}

# --- Stringly-typed throws: surface errors as values or typed exceptions -----
# These erase the error type: a caught StringException / IOError carries only a
# message, so a caller cannot dispatch on the cause (STYLE.md section 11). Prefer
# a domain value (an Either or a purpose-built sum) or, for a genuine fault, a
# typed Exception with its own instance.
#
# Banned in production. `throwString` stays permitted in the test suite, where it
# legitimately simulates an upstream failure (to exercise a catch path) or marks a
# handle field a test asserts is never called; the `within:` list is those test
# modules, and production code has no such use.
- functions:
    - {name: System.IO.Error.userError, within: [], message: "Stringly IOError: throw a typed Exception (e.g. a nullary type with an Exception instance), or return a domain value. See STYLE.md section 11."}
    - {name: UnliftIO.Exception.stringException, within: [], message: "Stringly exception: throw a typed Exception or return a domain value. See STYLE.md section 11."}
    - {name: UnliftIO.Exception.throwString, within: [Ecluse.RegistryProtocolSpec, Ecluse.Credential.Refresh.InternalSpec, Ecluse.EnvSpec, Ecluse.InFlightSpec, Ecluse.Rules.EffectfulSpec, Ecluse.Server.CacheSpec, Ecluse.Server.PipelineSpec, Ecluse.ServerSpec, Ecluse.WorkerSpec, EcluseSpec], message: "Stringly exception: in production, throw a typed Exception or return a domain value (STYLE.md section 11). Permitted in tests to simulate failures or mark unused handle stubs."}

# --- Debugging leftovers: banned in committed code --------------------------
- modules:
    - {name: Debug.Trace, within: [], message: "Remove debug tracing before committing; use 'katip' for real logging."}
