# Codecov configuration. See docs/testing.md -> "Coverage".
#
# Coverage is generated per gating test suite (HPC -> hpc-codecov, native Codecov
# JSON) and uploaded under a flag, so Codecov merges the tiers into one project
# total while still tracking each. Both the `unit` and `integration` tiers
# upload, each under its own flag. The smoke tier is excluded (non-gating,
# network-bound).

# Four coverage reports are uploaded per commit — `ecluse-core-unit` (flag:
# unit), `ecluse-runtime-unit` (flag: unit), `ecluse-unit` (flag: unit), and
# `ecluse-integration` (flag: integration)
# — all from the single gating build-test job. Wait for all FOUR before computing
# statuses: with the default (1), Codecov computes the project total off whichever
# upload lands first and fires a transient "coverage decreased" status, then
# re-computes when the others arrive. build-test always emits exactly these four,
# so a fixed wait is deterministic and safe here. (Were the count ever variable,
# notify.manual_trigger + an explicit send-notifications step would be the robust
# alternative.)
codecov:
  notify:
    after_n_builds: 4

coverage:
  status:
    project:
      default:
        target: auto # no regression versus the PR base
        threshold: 1% # absorb rounding/noise; block real drops
    patch:
      default:
        # New/changed lines >=85% covered — a sensible floor that verifies
        # behaviour without grinding on the number. Coverage exists to confirm
        # behaviour, not for "line go up": aim for thorough branch testing by
        # reasoning about the code, and let this status flag genuine gaps. ~95% is
        # a long-term goal, not a per-PR gate (chasing it is wasteful). The project
        # status above stays on no-regression, so the baseline still ratchets up as
        # well-covered changes land.
        target: 85%

# Flags let one combined gate span multiple suites. carryforward keeps a suite's
# last-known coverage on runs that don't re-upload it (e.g. a job that skipped).
#
# Three uploads land per commit: ecluse-core-unit (flag: unit), ecluse-unit (flag:
# unit), and ecluse-integration (flag: integration). Both unit suites upload under
# the same `unit` flag so Codecov merges their reports into one flag total; the
# `unit` paths cover src/ (composition shell), runtime/src/ (effectful edge), and
# core/src/ (core) so no layer is silently excluded from the merged flag view.
#
# carryforward is a SAFETY NET here, not an active path — settled, not a defect.
# The concern was: on a PR that *adds* a module, could a carried-forward stale flag
# report (one predating the module) make the merged view show the new module
# uncovered? It can't, because all flags re-upload on EVERY commit: the single
# `build-test` job runs all three Coverage steps unconditionally (no `if:` guard,
# `fail_ci_if_error: true`), so each flag always lands a fresh report and
# carryforward never substitutes. It would only kick in if an upload were genuinely
# missing (a flag's job removed/skipped), and then keeping the last-known number
# beats dropping the flag to 0% and firing a false regression.
flags:
  unit:
    paths:
      - src/
      - runtime/src/
      - core/src/
    carryforward: true
  integration:
    paths:
      - src/
      - runtime/src/
      - core/src/
    carryforward: true

# Out of scope for coverage: the thin executable entry point, the inform-only
# benchmark harness (bench/ — measured for time and allocations, never application
# code under test, so its new files must not count toward project or patch
# coverage), and the tests. The
# `test/**` glob already covers the shared ecluse-test-support library under
# test/support/, but it is called out explicitly below because that library is a
# first-class cabal component (its Ecluse.Test.* modules are instrumented by the
# coverage build), so it must never be attributed as software under test. The
# core/test/unit/** glob covers the new ecluse-core-unit spec files (under test,
# not under test). The generation side enforces this too: scripts/coverage.sh and
# scripts/coverage-combined.sh exclude every Ecluse.Test.* module from the HPC
# report, so the support library never reaches Codecov in the first place. The
# `src/` and `core/src/` paths in `flags.*.paths` above are the matching positive
# constraint.
ignore:
  - "app/**"
  - "bench/**"
  - "test/**"
  - "test/support/**"
  - "core/test/**"
  - "runtime/test/**"

comment:
  layout: "reach, diff, flags, files"
  require_changes: true
