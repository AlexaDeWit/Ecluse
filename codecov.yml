# Codecov configuration. See CONTRIBUTING.md -> "Coverage".
#
# Coverage is generated per gating test suite (HPC -> hpc-codecov, native Codecov
# JSON) and uploaded under a flag, so Codecov merges the tiers into one project
# total while still tracking each. `unit` uploads today; `integration` wires in
# identically once its suite has real cases. The smoke tier is excluded
# (non-gating, network-bound).

coverage:
  status:
    project:
      default:
        target: auto # no regression versus the PR base
        threshold: 1% # absorb rounding/noise; block real drops
    patch:
      default:
        # New/changed lines must be >=95% covered: the standard for all newly
        # introduced work. The project status above stays on no-regression, so
        # the codebase baseline ratchets up as well-covered changes land rather
        # than gating the whole tree to an absolute number it is not yet at.
        target: 95%

# Flags let one combined gate span multiple suites. carryforward keeps a suite's
# last-known coverage on runs that don't re-upload it (e.g. a job that skipped).
flags:
  unit:
    paths:
      - src/
    carryforward: true
  integration:
    paths:
      - src/
    carryforward: true

# Out of scope for coverage: the thin executable entry point and the tests.
ignore:
  - "app/**"
  - "test/**"

comment:
  layout: "reach, diff, flags, files"
  require_changes: true
