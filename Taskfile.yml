version: '3'
vars:
  IMAGE: docker.io/alexadewit/ecluse
  DOCS_BUILDDIR: dist-newstyle
  BENCH_PROFILE_DIR: dist-bench-prof
  SUITE: ecluse-unit
  COVERAGE_FLAGS: -fdev-http-egress
  HADDOCK_FLAGS: --haddock-hyperlink-source --haddock-quickjump
  PANDOC_FLAGS: --standalone --from gfm --template web/template.html --lua-filter web/mermaid.lua --lua-filter web/links.lua
  NIX_BENCH: '{{if env "IN_NIX_SHELL"}}{{else}}nix develop ".#ci" --command{{end}}'
tasks:
  default:
    cmds:
      - task --list
  version:
    desc: Print the release version (ecluse.cabal `version:`)
    silent: true
    cmds:
      - |
        v="$(cabal info ./ecluse.cabal 2>/dev/null | sed -n -E 's/^\* ecluse-([0-9.]+).*/\1/p' | head -n1)"
        [ -n "$v" ] && echo "$v" || { echo "task version: could not read from 'cabal info'" >&2; exit 1; }
  tag:
    desc: Create signed tag v<version> from the cabal version
    silent: true
    cmds:
      - |
        v="v$(task version)"
        git tag -s -m "Release $v" "$v"
        echo "created $v — push to release:  git push origin $v"
  update:
    desc: Refresh the cabal package index
    cmds:
      - cabal update
  freeze:
    desc: Regenerate cabal.project.freeze from the Nix package set (the version authority)
    cmds:
      - cp --no-preserve=mode,timestamps "$(nix build .#cabal-freeze --print-out-paths --no-link)" cabal.project.freeze
  bump-index-state:
    desc: Advance cabal.project's index-state to the newest Hackage index (needed only when a freeze pin postdates it)
    cmds:
      - cabal update
      - |
        bash -c 'ts=$(cabal update 2>&1 | sed -n "s/.*index-state is set to \(.*\)\.$/\1/p" | tail -1); \
        [ -n "$ts" ] && sed -i "s/^index-state:.*/index-state: $ts/" cabal.project'
  build:
    desc: Build library, executable, and all test suites
    cmds:
      - cabal build all --enable-tests
  test:
    desc: Run the fast, gating unit suites (core + app)
    cmds:
      - cabal test ecluse-core-unit ecluse-runtime-unit ecluse-unit --test-show-details=direct
  test-integration:
    desc: Run the integration suite (requires a Docker daemon)
    env:
      # Pin this worktree's reaping scope so the harness stamps every container with
      # it (see Ecluse.Test.Containers) and the reaps below target only our own.
      ECLUSE_TEST_SCOPE:
        sh: bash scripts/test-containers.sh scope
    cmds:
      # Sweep this worktree's strays from a prior killed run first, then reap again on
      # exit. Both are scoped, so a sibling worktree's live containers are never touched.
      - bash scripts/test-containers.sh reap
      - defer: bash scripts/test-containers.sh reap
      - cabal test ecluse-integration --test-show-details=direct
  test-residency:
    desc: Run the bounded-memory streaming gate (S54; own process, RTS -T)
    cmds:
      - cabal test ecluse-residency --test-show-details=direct
  test-smoke:
    desc: Run the smoke suite (live registries; non-gating)
    cmds:
      - cabal test ecluse-smoke --test-show-details=direct
  test-e2e:
    desc: End-to-end suite against a locally built OCI image (requires E2E image to run tests, E2E daemon must be active, E2E deps must be built)
    env:
      # Pin this worktree's reaping scope so the harness stamps every container with
      # it (see Ecluse.Test.Containers) and the reaps below target only our own.
      ECLUSE_TEST_SCOPE:
        sh: bash scripts/test-containers.sh scope
    cmds:
      # Sweep this worktree's strays from a prior killed run first, then reap again on
      # exit. Both are scoped, so a sibling worktree's live containers are never touched.
      - bash scripts/test-containers.sh reap
      - defer: bash scripts/test-containers.sh reap
      - |
        echo "==> building the OCI image (.#dockerImage)"
        img_archive="$(nix build .#dockerImage --no-link --print-out-paths)"
        
        echo "==> loading the image into docker"
        tag="$(docker load <"$img_archive" | sed -n 's/^Loaded image: //p' | head -1)"
        if [ -z "$tag" ]; then
          echo "could not determine the loaded image tag from 'docker load'" >&2
          exit 1
        fi
        echo "==> image: $tag"
        
        echo "==> running ecluse-e2e"
        ECLUSE_E2E_IMAGE="$tag" cabal test ecluse-e2e --test-show-details=direct
  test-clean:
    desc: Reap THIS worktree's leftover test containers/networks (scoped; safe while other agents or worktrees run)
    cmds:
      - bash scripts/test-containers.sh reap
  test-clean-all:
    desc: Reap ALL Écluse test containers/networks/images across every worktree (only when no other suite is running)
    cmds:
      - bash scripts/test-containers.sh reap --all
  test-all:
    desc: Run every test suite
    cmds:
      - task: test
      - task: test-integration
      - task: test-smoke
  bench:
    desc: Run the work-per-request benchmarks
    cmds:
      - '{{.NIX_BENCH}} cabal bench ecluse-bench --benchmark-options="{{.BENCH_OPTS}}"'
  bench-report:
    desc: Render the work-per-request bench CSV as a Markdown report
    cmds:
      - '{{.NIX_BENCH}} cabal run -v0 bench-report -- {{.BENCH_CSV | default "bench-results.csv"}} {{.BENCH_LOG | default "bench-output.txt"}}'
  bench-profile:
    desc: Profiling build -> run -> cost-centre flame graph
    cmds:
      - '{{.NIX_BENCH}} cabal build ecluse-bench --enable-profiling --profiling-detail=late --builddir={{.BENCH_PROFILE_DIR}}'
      - |
        {{.NIX_BENCH}} bash -c 'set -euo pipefail; \
        bin=$(cabal list-bin ecluse-bench --enable-profiling --builddir={{.BENCH_PROFILE_DIR}}); \
        "$bin" {{.BENCH_PROFILE_OPTS | default "-p express"}} +RTS -p -RTS; \
        ghc-prof-flamegraph ecluse-bench.prof -o ecluse-bench.svg; \
        echo "flame graph: ecluse-bench.svg  (cost-centre profile: ecluse-bench.prof)"'
  bench-load:
    desc: Run the throughput & latency load tests
    cmds:
      - '{{.NIX_BENCH}} cabal run -v0 bench-load'
  perf-acceptance:
    desc: Run the live performance-acceptance harness
    cmds:
      - cabal run -v0 perf-acceptance
  doctest:
    desc: Run the Haddock >>> examples as tests
    cmds:
      - cabal repl --with-ghc=doctest --repl-options="-Wwarn -Wno-missing-export-lists" lib:ecluse
  coverage:
    desc: Combined unit + integration coverage matching Codecov
    preconditions:
      - sh: docker info >/dev/null 2>&1
        msg: "coverage: the combined report needs a running Docker daemon (ecluse-integration drives ministack containers via testcontainers)."
    env:
      ECLUSE_COVERAGE_QUIET_PARTIAL: 1
    cmds:
      - task: coverage-unit
        vars: { SUITE: ecluse-core-unit }
      - task: coverage-unit
        vars: { SUITE: ecluse-unit }
      - task: coverage-unit
        vars: { SUITE: ecluse-runtime-unit }
      # The integration tier drives ministack containers, so it runs in its own task that pins
      # the reaping scope and reaps around itself -- the integration suite's Docker lifecycle on
      # the `task check` path (which runs coverage), matching what `test-integration` does. It is
      # kept out of the shared `coverage-unit` because that scope env (an ECLUSE_-prefixed var)
      # would leak into the unit tiers, whose BootSpec boots the real server from the process
      # environment and rejects the unknown ECLUSE_TEST_SCOPE config key.
      - task: coverage-integration
      - |
        core_unit_tix="$(find dist-coverage -type f -name ecluse-core-unit.tix | head -n1)"
        runtime_unit_tix="$(find dist-coverage -type f -name ecluse-runtime-unit.tix | head -n1)"
        unit_tix="$(find dist-coverage -type f -name ecluse-unit.tix | head -n1)"
        integration_tix="$(find dist-coverage -type f -name ecluse-integration.tix | head -n1)"
        if [ -z "$core_unit_tix" ] || [ -z "$runtime_unit_tix" ] || [ -z "$unit_tix" ] || [ -z "$integration_tix" ]; then
          echo "coverage: missing a tier .tix under dist-coverage/ (did all four suites run?)" >&2
          exit 1
        fi
        hpc combine --union --output=dist-coverage/unit-core-runtime.tix "$core_unit_tix" "$runtime_unit_tix"
        hpc combine --union --output=dist-coverage/unit-combined.tix dist-coverage/unit-core-runtime.tix "$unit_tix"
        hpc combine --union --output=dist-coverage/combined.tix dist-coverage/unit-combined.tix "$integration_tix"
        
        mix_args=()
        while IFS= read -r d; do
          mix_args+=(-m "$d")
        done < <(find dist-coverage -type d -path '*/hpc/vanilla/mix')
        
        support_exclude=()
        while IFS= read -r module; do
          support_exclude+=(-x "$module")
        done < <(find test/support -name '*.hs' | sed -e 's#^test/support/##' -e 's#/#.#g' -e 's#\.hs$##')
        
        hpc-codecov "${mix_args[@]}" -s . -x Main -x Paths_ecluse "${support_exclude[@]}" -f codecov -o coverage/combined.json dist-coverage/combined.tix
        echo "coverage: wrote coverage/combined.json (combined core-unit ∪ app-unit ∪ integration — matches Codecov's merged total)"
  coverage-unit:
    desc: Fast, Docker-free unit-only coverage
    cmds:
      - bash scripts/coverage.sh {{.SUITE}} {{.COVERAGE_FLAGS}}
  coverage-integration:
    desc: Integration-tier coverage (drives ministack; scoped + reaped like test-integration)
    env:
      # Pin this worktree's reaping scope so the ministack containers this tier starts are
      # stamped with it (see Ecluse.Test.Containers) and the reaps below target only our own.
      # Isolated to this task -- never the shared `coverage-unit` -- because ECLUSE_TEST_SCOPE
      # is an ECLUSE_-prefixed var the config resolver treats as an unknown key, which would
      # abort BootSpec's boot-the-real-server cases in the unit tiers (they read the process
      # environment). The Haskell writer defaults to an unreapable "local" when it is unset.
      ECLUSE_TEST_SCOPE:
        sh: bash scripts/test-containers.sh scope
    cmds:
      # Sweep this worktree's strays from a prior killed run first, then reap again on exit, so a
      # hard-killed coverage run leaves no scoped ministack orphans. Both scoped, so a sibling
      # worktree's live containers are never touched.
      - bash scripts/test-containers.sh reap
      - defer: bash scripts/test-containers.sh reap
      - bash scripts/coverage.sh ecluse-integration {{.COVERAGE_FLAGS}}
  gen-version-fixtures:
    desc: Regenerate version-ordering fixtures
    cmds:
      - bash scripts/gen-version-fixtures.sh
  gen-bench-corpus:
    desc: Re-capture the real-world packument benchmark corpus
    cmds:
      - bash scripts/gen-bench-corpus.sh
  new-worktree:
    desc: Create an agent worktree on BRANCH and warm its HLS index
    requires:
      vars: [BRANCH]
    cmds:
      - bash scripts/new-worktree.sh "{{.BRANCH}}" "{{.BASE}}" "{{.DIR}}"
  rm-worktree:
    desc: Retire BRANCH's agent worktree and reap its HLS cache (the branch is kept; FORCE=1 to discard local changes)
    requires:
      vars: [BRANCH]
    cmds:
      - bash scripts/rm-worktree.sh "{{.BRANCH}}" "{{.DIR}}"
  worktree-clean:
    desc: Reap HLS caches stranded by deleted worktrees and prune stale registrations (safe while other worktrees build; --dry-run to preview)
    cmds:
      - bash scripts/reap-hls-caches.sh {{.CLI_ARGS}}
  format:
    desc: Reformat Haskell sources in place
    cmds:
      - find . -name '*.hs' -not -path '*/dist-*' -not -path '*/.git/*' -not -path '*/.agents/*' -exec fourmolu --mode inplace {} +
  format-check:
    desc: Check formatting without writing
    sources:
      - '**/*.hs'
      - 'fourmolu.yaml'
      - 'flake.lock'
      - 'ecluse.cabal'
      - 'cabal.project.freeze'
      - exclude: 'dist-*/**'
      - exclude: '.git/**'
      - exclude: '.agents/**'
      - exclude: 'coverage/**'
      - exclude: '_site/**'
      - exclude: 'scratchpad/**'
    cmds:
      - find . -name '*.hs' -not -path '*/dist-*' -not -path '*/.git/*' -not -path '*/.agents/*' -exec fourmolu --mode check {} +
  lint:
    desc: Run hlint
    sources:
      - '**/*.hs'
      - '.hlint.yaml'
      - 'flake.lock'
      - 'ecluse.cabal'
      - 'cabal.project.freeze'
      - exclude: 'dist-*/**'
      - exclude: '.git/**'
      - exclude: '.agents/**'
      - exclude: 'coverage/**'
      - exclude: '_site/**'
      - exclude: 'scratchpad/**'
    cmds:
      - find . -name '*.hs' -not -path '*/dist-*' -not -path '*/.git/*' -not -path '*/.agents/*' -exec hlint {} +
  sast:
    desc: Static analysis (Semgrep)
    sources:
      - '**/*.hs'
      - '**/*.sh'
      - '**/*.yaml'
      - '**/*.json'
      - 'flake.lock'
      - 'ecluse.cabal'
      - 'cabal.project.freeze'
      - exclude: 'dist-*/**'
      - exclude: '.git/**'
      - exclude: '.agents/**'
      - exclude: 'coverage/**'
      - exclude: '_site/**'
      - exclude: 'scratchpad/**'
      - exclude: 'sbom/**'
      - exclude: '*.json'
    cmds:
      # missing-integrity is excluded by repo-owner disposition (PR #694): SRI
      # applies to fetched subresources, and this site has none that are
      # externally hosted. The only absolute-URL <link> tags are rel="canonical"
      # (pure metadata, no fetch), and all runtime assets (Mermaid, Redoc, CSS)
      # are vendored same-origin and hash-pinned through the flake. Excluding
      # the rule here, rather than per-tag nosemgrep comments, also keeps the
      # findings out of the SARIF upload, so code scanning stays quiet too.
      - semgrep scan --config auto --severity ERROR --severity WARNING --exclude-rule html.security.audit.missing-integrity.missing-integrity --sarif-output=semgrep.sarif --error .
  cabal-check:
    desc: Validate the .cabal package metadata
    sources:
      - ecluse.cabal
      - cabal.project
      - flake.lock
    cmds:
      - |
        out=$(cabal check 2>&1); printf "%s\n" "$out"; case "$out" in *Warning:*|*Error:*) exit 1 ;; esac
  lint-workflows:
    desc: Lint GitHub Actions workflows
    sources:
      - '.github/workflows/*.yml'
      - 'flake.lock'
    cmds:
      - actionlint
      - zizmor .github/workflows/
  lint-scripts:
    desc: Lint shell scripts
    sources:
      - 'scripts/**/*.sh'
      - 'flake.lock'
    cmds:
      - find . -name '*.sh' -not -path '*/dist-*' -not -path '*/.git/*' -not -path '*/.agents/*' -exec shellcheck --severity=warning {} +
  lint-spdx:
    desc: Check SPDX licence headers on tracked Haskell sources
    sources:
      - '**/*.hs'
      - 'LICENSES/**'
      - 'flake.lock'
      - exclude: 'dist-*/**'
      - exclude: '.git/**'
      - exclude: '.agents/**'
      - exclude: 'coverage/**'
      - exclude: '_site/**'
      - exclude: 'scratchpad/**'
    cmds:
      # The file list comes from git at run time, never a static list, so the
      # gate stays correct while concurrent work adds, moves, or splits modules.
      - git ls-files -z -- '*.hs' | xargs -0 -r reuse lint-file
  spdx-fix:
    desc: Insert missing SPDX licence headers into tracked Haskell sources
    cmds:
      # Select-then-stamp: only tracked files missing the tag reach reuse, so a
      # rerun never touches a stamped file. That is load-bearing, not merely an
      # optimisation: fourmolu glues the header to a directly following comment
      # block (it drops the blank separator in a pragma prologue), and
      # re-annotating a glued block makes reuse rewrite it as "the header" and
      # discard the original comment. git grep -L lists tracked files without
      # the tag and exits 1 when every file carries it, hence the guard.
      - '{ git grep -z -L "SPDX-License-Identifier: MIT" -- "*.hs" || true; } | xargs -0 -r reuse annotate --license MIT --copyright "Alexandra de Wit" --year 2026'
  test-scripts:
    desc: Run the shell-script unit tests
    sources:
      - 'scripts/**/*.sh'
      - 'flake.lock'
    cmds:
      - bash scripts/rewrite-haddock-dep-links.test.sh
  analysis-build:
    desc: Build exe:ecluse with .hie output for weeder and stan
    # weeder and stan want the same artefact: exe:ecluse built with -fwrite-ide-info.
    # One build serves both. Building it per-tool instead would have each cabal build
    # clone the amazonka source-repository-package into its own builddir at the same
    # moment, and two concurrent clones of one repo get the connection reset: git exits
    # 128 and reddens the whole of `check` on a clean tree (#826).
    #
    # `run: once` is load-bearing. weeder and stan both depend on this task and run
    # concurrently, and go-task's default (`always`) honours both calls: that is two
    # builds again, now racing into ONE builddir. With `once`, go-task dedupes on the
    # task name and the second caller blocks until the first execution finishes, so stan
    # waits for the build rather than reading a half-written dist-analysis.
    run: once
    cmds:
      - cabal build exe:ecluse --builddir=dist-analysis --ghc-options=-fwrite-ide-info
  weeder:
    desc: Report app-unreachable library code
    deps:
      - analysis-build
    cmds:
      - weeder --hie-directory dist-analysis
  stan:
    desc: Haskell static analysis
    deps:
      - analysis-build
    cmds:
      - stan --hiedir dist-analysis
      - |
        n=$(bash -c 'stan --hiedir dist-analysis --json-output | jq ".observations | length"'); \
        if [ "$n" -gt 0 ]; then echo "stan: $n finding(s) above the configured floor (fails the gate)"; exit 1; fi; \
        echo "stan: clean at the configured floor"
  stan-all:
    desc: Full stan report incl Performance/space-leak
    deps:
      - analysis-build
    cmds:
      - stan --hiedir dist-analysis --no-default
  cabal-checks:
    desc: Run all Cabal-dependent checks sequentially
    cmds:
      - task: build
      - task: coverage
      # The residency gate runs outside coverage on purpose: it measures live bytes,
      # and its process must not carry hpc's tix apparatus or another suite's heap.
      - task: test-residency
      - task: doctest
      - task: cabal-check
  static-checks:
    desc: Run all static analysis checks concurrently
    deps:
      - format-check
      - lint
      - sast
      - lint-workflows
      - lint-scripts
      - lint-spdx
      - test-scripts
      - site-stub
  analysis-checks:
    desc: Dead-code (weeder) and Haskell static analysis (stan)
    # Both tools share one -fwrite-ide-info build (analysis-build), then read its .hie
    # output. Reading is read-only, so they still run concurrently with each other; only
    # the build is serialised, which is where the contention actually was. The tier runs
    # AFTER the cabal and static tiers (see `check`), never piled onto the coverage
    # build's Docker ministack. Both fail on findings (weeder natively; stan via its own
    # exit), so this tier reddens `check` until the tree is clean of both.
    deps:
      - weeder
      - stan
  check:
    desc: Pre-push checks (build, tests, doctest, lint, Semgrep, dead-code, static analysis)
    # cabal and static tiers run concurrently first; the analysis tier follows so its
    # ide-info build does not contend with the coverage build for CPU.
    deps:
      - cabal-checks
      - static-checks
    cmds:
      - task: analysis-checks
  ci:
    desc: Reproduce the core CI pipeline locally
    cmds:
      # weeder and stan are part of `check` now (via analysis-checks); not repeated here.
      - task: check
      - task: docs-check
  gate:
    desc: Reproduce the full CI gate locally
    cmds:
      - task: check
      - task: test-integration
      - task: docs-check
  run:
    desc: Run the proxy
    cmds:
      - cabal run ecluse
  docs:
    desc: Build hyperlinked, searchable Haddock HTML
    cmds:
      - cabal haddock lib:ecluse lib:ecluse-core lib:ecluse-runtime {{.HADDOCK_FLAGS}}
      - |
        html=$(find dist-newstyle -path '*/doc/html/ecluse/index.html' | head -n1); \
        echo "Haddock: $html"; \
        command -v xdg-open >/dev/null 2>&1 && xdg-open "$html" >/dev/null 2>&1 &
  docs-check:
    desc: Build Haddock for the CI gate
    cmds:
      - cabal haddock lib:ecluse lib:ecluse-core lib:ecluse-runtime --haddock-quickjump --disable-documentation
  docs-site:
    desc: Build Haddock + OpenAPI manifest and stage under ./_site/api
    cmds:
      - cabal haddock lib:ecluse lib:ecluse-core lib:ecluse-runtime --builddir={{.DOCS_BUILDDIR}} {{.HADDOCK_FLAGS}}
      - rm -rf _site && mkdir -p _site/api && touch _site/.nojekyll
      - |
        appidx=$(find {{.DOCS_BUILDDIR}} -path '*/doc/html/ecluse/index.html' | grep -v '/l/' | head -n1); \
        coreidx=$(find {{.DOCS_BUILDDIR}} -path '*/l/ecluse-core/doc/html/*/index.html' | head -n1); \
        runtimeidx=$(find {{.DOCS_BUILDDIR}} -path '*/l/ecluse-runtime/doc/html/*/index.html' | head -n1); \
        for pair in "ecluse:$appidx" "ecluse-core:$coreidx" "ecluse-runtime:$runtimeidx"; do \
          name=${pair%%:*}; idx=${pair#*:}; \
          if [ -z "$idx" ] || [ ! -f "$idx" ]; then \
            echo "docs-site: no Haddock index for '$name'" >&2; exit 1; \
          fi; \
          mkdir -p "_site/api/$name" && cp -R "$(dirname "$idx")"/. "_site/api/$name/"; \
          echo "Staged $name -> _site/api/$name"; \
        done
      - echo "Rewriting dependency cross-links to canonical Hackage URLs"
      - bash scripts/rewrite-haddock-dep-links.sh _site/api
      - |
        if grep -rlE 'file:///|\$\{pkgroot\}|/store/ghc-|/nix/store/' _site/api >/dev/null 2>&1; then \
          echo "docs-site: unresolved/leaky dependency links survived" >&2; \
          grep -rlE 'file:///|\$\{pkgroot\}|/store/ghc-|/nix/store/' _site/api >&2; exit 1; \
        fi
      - cp web/api-index.html _site/api/index.html
      - cabal run -v0 --builddir={{.DOCS_BUILDDIR}} openapi-gen -- _site/api/openapi.json
      - mkdir -p _site/api/openapi && cp web/redoc.html _site/api/openapi/index.html
  site:
    desc: Assemble the Pages site
    deps:
      - docs-site
    cmds:
      - task: site:assemble
      - task: site:check
  # The pandoc-and-static half of `site`, shared with `site-stub` so the PR gate
  # assembles exactly what the Pages deploy assembles.
  site:assemble:
    internal: true
    cmds:
      - cp -R web/static/. _site/
      - cp docs/branding/logo.svg docs/branding/favicon-32.png docs/branding/lock-illustration.svg docs/social-preview.png _site/
      - sh -c 'mkdir -p _site/vendor && cp "$MERMAID_JS" _site/vendor/mermaid.min.js && cp "$REDOC_JS" _site/vendor/redoc.standalone.js'
      - mkdir -p _site/architecture
      - task: site:pandoc
  # PR-tier site gate: everything the link and metadata checks cover lives in
  # web/, the Markdown sources, and the sitemap, none of which needs Haddock or
  # the OpenAPI generator. Stub the two generated API artefacts (the hub pages
  # are real; the checkers exempt the Haddock tree interiors, which docs-site
  # gates itself) and run the same site:check the Pages deploy runs on main.
  site-stub:
    desc: Assemble the pandoc site over stubbed API artefacts and run the site checks
    cmds:
      - rm -rf _site && mkdir -p _site/api/openapi && touch _site/.nojekyll
      - cp web/api-index.html _site/api/index.html
      - cp web/redoc.html _site/api/openapi/index.html
      - printf '{}' > _site/api/openapi.json
      - task: site:assemble
      - task: site:check
  site:pandoc:
    internal: true
    deps:
      - task: site:pandoc-page
        vars: { SRC: "MOTIVATION.md", OUT: "motivation.html", TITLE: "Why Écluse?", DESCRIPTION: "Why package registries need a policy enforcement point, and the design bet behind Écluse." }
      - task: site:pandoc-page
        vars: { SRC: "ALTERNATIVES.md", OUT: "alternatives.html", TITLE: "Alternatives", DESCRIPTION: "Compare Écluse with registry hosts, repository managers, and package-security tools." }
      - task: site:pandoc-page
        vars: { SRC: "USAGE.md", OUT: "usage.html", TITLE: "Operator Manual", DESCRIPTION: "Deploy, configure, and operate Écluse safely as a package-registry policy proxy.", EXTRA_FLAGS: "--lua-filter web/embed-config.lua" }
      - task: site:pandoc-page
        vars: { SRC: "web/threat-model.md", OUT: "threat-model.html", TITLE: "Threat Model", DESCRIPTION: "The generated STRIDE threat register and deployment assumptions for Écluse.", EXTRA_FLAGS: "--lua-filter web/threat-register.lua" }
      - task: site:pandoc-page
        vars: { SRC: "SECURITY.md", OUT: "security.html", TITLE: "Security Policy", DESCRIPTION: "How to report a vulnerability in Écluse, and where the threat model and security invariants live." }
      - task: site:pandoc-page
        vars: { SRC: "docs/architecture.md", OUT: "architecture.html", TITLE: "Architecture", DESCRIPTION: "How Écluse is designed: the request lifecycle, the codebase decomposition, and the map of concern documents.", EXTRA_FLAGS: "-M link-base=docs" }
      - task: site:pandoc-page
        vars: { SRC: "docs/architecture/registry-model.md", OUT: "architecture/registry-model.html", TITLE: "Registry model", DESCRIPTION: "The four registry roles behind one endpoint: private-first reads, gated public fallback, mirror and publication writes, and the packument merge.", EXTRA_FLAGS: "-M link-base=docs/architecture -M prefix=../" }
      - task: site:pandoc-page
        vars: { SRC: "docs/architecture/rules-engine.md", OUT: "architecture/rules-engine.html", TITLE: "Rules engine", DESCRIPTION: "How Écluse decides: deny-by-default evaluation, rule precedence, advisory gating, and how verdicts apply to packuments and tarballs.", EXTRA_FLAGS: "-M link-base=docs/architecture -M prefix=../" }
      - task: site:pandoc-page
        vars: { SRC: "docs/architecture/web-layer.md", OUT: "architecture/web-layer.html", TITLE: "Web layer", DESCRIPTION: "The raw-WAI front door: routing and mounts, the capability manifest, streaming, admission control, and the error model.", EXTRA_FLAGS: "-M link-base=docs/architecture -M prefix=../" }
      - task: site:pandoc-page
        vars: { SRC: "docs/architecture/security.md", OUT: "architecture/security.html", TITLE: "Security design", DESCRIPTION: "The security design: the egress invariants, the SSRF posture, credential handling, and the shared-responsibility boundary with the operator.", EXTRA_FLAGS: "-M link-base=docs/architecture -M prefix=../" }
      - task: site:pandoc-page
        vars: { SRC: "docs/architecture/access-model.md", OUT: "architecture/access-model.html", TITLE: "Access model", DESCRIPTION: "Who holds which credential: passthrough reads, the mirror-write provider, edge authentication, and the planned service-credential model.", EXTRA_FLAGS: "-M link-base=docs/architecture -M prefix=../" }
      - task: site:pandoc-page
        vars: { SRC: "docs/architecture/fault-model.md", OUT: "architecture/fault-model.html", TITLE: "Fault model", DESCRIPTION: "How faults are classified and rendered: the typed request perimeter, pre- and post-commit dispositions, and steady-state-zero alarms.", EXTRA_FLAGS: "-M link-base=docs/architecture -M prefix=../" }
      - task: site:pandoc-page
        vars: { SRC: "docs/architecture/observability.md", OUT: "architecture/observability.html", TITLE: "Observability", DESCRIPTION: "Traces, metrics, and logs over OpenTelemetry: the metric catalogue, the Datadog path, and what is deliberately never recorded.", EXTRA_FLAGS: "-M link-base=docs/architecture -M prefix=../" }
      - task: site:pandoc-page
        vars: { SRC: "docs/architecture/cloud-backends.md", OUT: "architecture/cloud-backends.html", TITLE: "Cloud backends", DESCRIPTION: "The cloud edge behind handles: the mirror queue, the credential provider, service mapping, and the unified multicall binary.", EXTRA_FLAGS: "-M link-base=docs/architecture -M prefix=../" }
      - task: site:pandoc-page
        vars: { SRC: "docs/architecture/release-supply-chain.md", OUT: "architecture/release-supply-chain.html", TITLE: "Release and supply chain", DESCRIPTION: "How a release is cut and attested: reproducible Nix builds, keyless provenance and SBOM attestations, and vulnerability scanning.", EXTRA_FLAGS: "-M link-base=docs/architecture -M prefix=../" }
      - task: site:pandoc-page
        vars: { SRC: "docs/architecture/configuration.md", OUT: "architecture/configuration.html", TITLE: "Configuration model", DESCRIPTION: "The configuration model: sources and precedence, validation, runtime sizing, and the document-merge schema for rules.", EXTRA_FLAGS: "-M link-base=docs/architecture -M prefix=../" }
  site:pandoc-page:
    internal: true
    sources:
      - '{{.SRC}}'
      - web/template.html
      - web/static/style.css
      - web/links.lua
      - web/mermaid.lua
    generates:
      - '_site/{{.OUT}}'
    cmds:
      - pandoc '{{.SRC}}' -o '_site/{{.OUT}}' {{.PANDOC_FLAGS}} {{if .EXTRA_FLAGS}}{{.EXTRA_FLAGS}}{{end}} -M title="{{.TITLE}}" -M description="{{.DESCRIPTION}}" -M canonical-url="https://ecluse-proxy.com/{{.OUT}}"
  site:check:
    internal: true
    cmds:
      - bash scripts/check-site-metadata.sh _site
      - bash scripts/check-site-links.sh _site
  nix-build:
    desc: Build the release artifact via Nix (hermetic)
    cmds:
      - nix build
  nix-check:
    desc: Evaluate every flake output and build the hermetic Haddock check
    cmds:
      - nix flake check
  docker-build:
    desc: Build the lean OCI image via Nix
    cmds:
      - nix build .#dockerImage
  docker-push:
    desc: Push ./result to IMAGE:TAG
    requires:
      vars: [TAG]
    cmds:
      - printf '%s' "$DOCKERHUB_TOKEN" | skopeo login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin
      - skopeo copy docker-archive:./result "docker://{{.IMAGE}}:{{.TAG}}"
  sbom:
    desc: Generate the image SBOM
    cmds:
      - mkdir -p sbom
      - sbomnix --spdx sbom/ecluse.spdx.json --cdx sbom/ecluse.cdx.json --csv sbom/ecluse.csv .#ecluse-bin
  scan:
    desc: Scan the image closure for CVEs
    cmds:
      - mkdir -p sbom
      - sbomnix --cdx sbom/ecluse.cdx.json .#ecluse-bin
      - grype sbom:sbom/ecluse.cdx.json -o table -o json=grype.json -o sarif=grype.sarif
      - bash scripts/grype-sarif-locations.sh grype.sarif
  scan-vulnix:
    desc: Secondary Nix-native cross-check (vulnix)
    ignore_error: true
    cmds:
      - bash -c 'vulnix -C $(nix build .#ecluse-bin --no-link --print-out-paths)'
  scan-osv:
    desc: Query OSV.dev for HSEC advisories against the pinned Haskell closure
    cmds:
      - bash scripts/osv-freeze-scan.sh
  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist-newstyle dist-bench-prof result sbom grype.json grype.sarif osv-freeze.json osv-freeze.md ecluse-bench.prof ecluse-bench.svg
